apiVersion: v1
kind: Service
metadata:
  name: strata
  namespace: strata
  labels:
    app.kubernetes.io/name: strata
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: strata
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 9000
      targetPort: http
      protocol: TCP
---
# Optional external Service. Drop or rename if Ingress is the only ingress
# path. ClusterIP above is what Ingress targets internally.
apiVersion: v1
kind: Service
metadata:
  name: strata-lb
  namespace: strata
  labels:
    app.kubernetes.io/name: strata
    app.kubernetes.io/component: gateway-lb
  annotations:
    # Disable proxy-protocol / connection draining tweaks per cloud here.
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: strata
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
