# Example Secret. Replace every placeholder before applying — never commit
# the rendered file to a public repo. In production manage this via your
# secret store (sealed-secrets, vault-csi, external-secrets, …) instead of
# a static manifest.
apiVersion: v1
kind: Secret
metadata:
  name: strata-secrets
  namespace: strata
  labels:
    app.kubernetes.io/name: strata
type: Opaque
stringData:
  # Root S3 credentials. Format: "<access>:<secret>:<owner>[,<access>:<secret>:<owner>]"
  STRATA_STATIC_CREDENTIALS: "REPLACE_ACCESS_KEY:REPLACE_SECRET_KEY:owner"
  # 32-byte hex JWT secret for the embedded operator console (HS256).
  # Generate: `openssl rand -hex 32`.
  STRATA_CONSOLE_JWT_SECRET: "REPLACE_64_HEX_CHARS"
  # RADOS user. The keyring is mounted via a separate Secret entry below.
  STRATA_RADOS_USER: "client.strata"
  STRATA_RADOS_POOL: "strata.rgw.buckets.data"
  STRATA_RADOS_CLASSES: "STANDARD=strata.rgw.buckets.data,STANDARD_IA=strata.rgw.buckets.ia,GLACIER_IR=strata.rgw.buckets.cold"
  ceph.conf: |
    [global]
    mon_host = ceph-mon.ceph.svc.cluster.local
    auth_cluster_required = cephx
    auth_service_required = cephx
    auth_client_required = cephx
  keyring: |
    [client.strata]
    key = REPLACE_BASE64_KEY
