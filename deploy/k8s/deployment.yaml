apiVersion: apps/v1
kind: Deployment
metadata:
  name: strata
  namespace: strata
  labels:
    app.kubernetes.io/name: strata
    app.kubernetes.io/component: gateway
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: strata
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: strata
        app.kubernetes.io/component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/metrics"
    spec:
      # Spread replicas across nodes so a single node loss doesn't
      # take down the whole gateway tier.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: strata
                    app.kubernetes.io/component: gateway
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      containers:
        - name: strata
          image: ghcr.io/danchupin/strata:latest
          imagePullPolicy: IfNotPresent
          args: ["server"]
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: strata-config
            - secretRef:
                name: strata-secrets
          env:
            # Per-pod stable identity for the cluster_nodes heartbeat row.
            - name: STRATA_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: ceph-config
              mountPath: /etc/ceph
              readOnly: true
            - name: jwt-shared
              mountPath: /etc/strata/jwt-shared
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        # ceph.conf + keyring projected from the strata-secrets Secret.
        - name: ceph-config
          secret:
            secretName: strata-secrets
            items:
              - key: ceph.conf
                path: ceph.conf
              - key: keyring
                path: keyring
        # Shared JWT-secret volume across replicas. The first replica that
        # starts writes /etc/strata/jwt-shared/secret atomically (O_EXCL);
        # peers re-read it. Required so console sessions survive LB-flips.
        # In a single-AZ cluster a ReadWriteMany PVC works; in cloud-native
        # multi-AZ deployments prefer setting STRATA_CONSOLE_JWT_SECRET in
        # the Secret instead.
        - name: jwt-shared
          emptyDir:
            medium: Memory
