# nginx LB fronting the lab-tikv compose profile (US-003).
#
# Routes host port 9999 to the two TiKV-backed strata replicas
# (strata-tikv-a:9000, strata-tikv-b:9000) using least_conn so a slow
# replica does not soak up all requests. fail_timeout/max_fails take a
# replica out of rotation after 2 consecutive failures for 10s.
#
# STREAMING-FRIENDLY settings (multipart uploads, large GETs):
#   - proxy_request_buffering off  : pipe client body straight to upstream
#   - proxy_buffering off          : pipe upstream response straight to client
#   - client_max_body_size 0       : no upper bound on PUT body size
#   - proxy_read_timeout 300s      : large PutObject can run > default 60s
#   - proxy_send_timeout 300s      : ditto upload direction
#   - proxy_http_version 1.1       : keepalive + chunked encoding

upstream strata {
    least_conn;
    server strata-tikv-a:9000;
    server strata-tikv-b:9000 max_fails=2 fail_timeout=10s;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 0;

    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://strata;
    }
}
