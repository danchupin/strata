{{- if .Values.secret.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "strata.secretName" . }}
  labels:
    {{- include "strata.labels" . | nindent 4 }}
type: Opaque
stringData:
  STRATA_STATIC_CREDENTIALS: {{ .Values.secret.staticCredentials | quote }}
  STRATA_CONSOLE_JWT_SECRET: {{ .Values.secret.consoleJWTSecret | quote }}
  ceph.conf: |
{{ .Values.secret.cephConf | indent 4 }}
  keyring: |
{{ .Values.secret.keyring | indent 4 }}
{{- end -}}
