global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Unified strata service: gateway + selected workers all expose /metrics
  # on the gateway port (cfg.Listen, default 9000). Worker-specific
  # counters carry a `worker` label; no separate scrape job per worker.
  - job_name: strata
    static_configs:
      - targets: ["strata:9000"]
        labels:
          binary: strata

  # Optional features replica (notify / replicator / access-log /
  # inventory / audit-export). Enabled via `--profile features`. Until
  # the replica is up Prometheus logs a "no host" error which is
  # harmless; remove the block if features are never enabled in this
  # stack.
  - job_name: strata-features
    static_configs:
      - targets: ["strata-features:9000"]
        labels:
          binary: strata-features

  # Multi-cluster lab profile (strata-multi service on :9998 host port,
  # :9000 inside the compose network). `--profile multi-cluster` activates
  # this; until then the scrape just logs "no host" — harmless.
  - job_name: strata-multi
    static_configs:
      - targets: ["strata-multi:9000"]
        labels:
          binary: strata
          profile: multi-cluster

  # TiKV-backed lab profile: 2 replicas behind nginx LB at 9999 (host).
  # `--profile lab-tikv` activates these; until then the scrape just
  # logs "no host" — harmless.
  - job_name: strata-tikv-lab
    static_configs:
      - targets:
          - "strata-tikv-a:9000"
          - "strata-tikv-b:9000"
        labels:
          binary: strata
          profile: lab-tikv
