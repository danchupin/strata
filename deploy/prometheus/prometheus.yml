global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Strata SLO recording rules + alert rules (US-002 cycle B prod-observability).
# alerts.yml ships next to this file under deploy/prometheus/; the path is
# resolved relative to the prometheus binary's --config.file argument.
rule_files:
  - alerts.yml

scrape_configs:
  # TiKV-default 2-replica lab (bare `docker compose up -d`): strata-a +
  # strata-b expose /metrics on the gateway port (cfg.Listen, default
  # 9000); nginx LB at host :9999 fronts them. Worker-specific counters
  # carry a `worker` label; no separate scrape job per worker. Both
  # replicas attach to the `default` + `cephb` RADOS clusters via
  # STRATA_RADOS_CLUSTERS.
  - job_name: strata
    static_configs:
      - targets:
          - "strata-a:9000"
          - "strata-b:9000"
        labels:
          binary: strata

  # Cassandra-backed regression lab (--profile cassandra). When the
  # profile is not active the scrape logs "no host" — harmless.
  - job_name: strata-cassandra
    static_configs:
      - targets: ["strata-cassandra:9000"]
        labels:
          binary: strata
          profile: cassandra
