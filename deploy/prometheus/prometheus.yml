global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Unified strata service: gateway + selected workers all expose /metrics
  # on the gateway port (cfg.Listen, default 9000). Worker-specific
  # counters carry a `worker` label; no separate scrape job per worker.
  # Multi-cluster is the canonical default — the gateway attaches to both
  # `default` and `cephb` RADOS clusters via STRATA_RADOS_CLUSTERS.
  - job_name: strata
    static_configs:
      - targets: ["strata:9000"]
        labels:
          binary: strata

  # TiKV-backed lab profile: 2 replicas behind nginx LB at 9999 (host).
  # `--profile lab-tikv` activates these; until then the scrape just
  # logs "no host" — harmless.
  - job_name: strata-tikv-lab
    static_configs:
      - targets:
          - "strata-tikv-a:9000"
          - "strata-tikv-b:9000"
        labels:
          binary: strata
          profile: lab-tikv
