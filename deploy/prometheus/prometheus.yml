global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Unified strata service: gateway + selected workers all expose /metrics
  # on the gateway port (cfg.Listen, default 9000). Worker-specific
  # counters carry a `worker` label; no separate scrape job per worker.
  - job_name: strata
    static_configs:
      - targets: ["strata:9000"]
        labels:
          binary: strata

  # Optional features replica (notify / replicator / access-log /
  # inventory / audit-export). Enabled via `--profile features`. Until
  # the replica is up Prometheus logs a "no host" error which is
  # harmless; remove the block if features are never enabled in this
  # stack.
  - job_name: strata-features
    static_configs:
      - targets: ["strata-features:9000"]
        labels:
          binary: strata-features
