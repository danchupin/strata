# Strata alert + recording rules (cycle B prod-observability).
#
# Shipped rules:
#   * 17 SLO recording rules in `strata.recording` — centralize SLO targets
#     + per-window SLI ratios (5m / 1h / 6h / 1d). SLO target change =
#     1-file edit; alert rules below reference these via `strata:*:target`
#     so they auto-track.
#   * 18 alert rules across 7 SLO/SLI-aligned groups (availability, latency,
#     workers, replication, backends, security, drain) — US-002.
#   * 12 burn-rate alerts in `strata.burn_rate` (4-window multi-burn-rate,
#     Google SRE workbook ch.5: 4 windows × 3 SLOs) — US-003.
#
# Total: 47 rules. See docs/site/content/operate/alerts.md for runbooks +
# Alertmanager routing recipe + burn-rate philosophy.
#
# Label conventions:
#   * severity ∈ {critical, warning, info}
#   * team = storage (single team owns Strata today)
#   * slo ∈ {availability, latency, durability} or omitted for non-SLO rules
#
# Validate via `make promtool-check`. CI installs promtool; locally the
# target degrades to WARN + exit 0 when the binary is missing (mirrors
# `make helm-lint`).

groups:
  - name: strata.recording
    interval: 30s
    rules:
      # ---- SLO target constants ----------------------------------------
      # Change a single line here to re-tune the SLO; every alert + burn-
      # rate alert that references the target rule auto-tracks.
      - record: strata:slo_availability:target
        expr: vector(0.999)
      - record: strata:slo_latency_get_put_seconds:target
        expr: vector(0.5)
      - record: strata:slo_latency_list_seconds:target
        expr: vector(2)
      - record: strata:slo_latency_multipart_complete_seconds:target
        expr: vector(1)
      - record: strata:slo_durability_error_rate:target
        expr: vector(0)

      # ---- 5m SLI ratios ------------------------------------------------
      # Availability: non-5xx ratio over the S3 traffic surface (admin
      # paths excluded; admin 5xx is operator-visible separately).
      - record: strata:availability:ratio_rate5m
        expr: |
          1 - (
            sum(rate(strata_http_requests_total{code=~"5..",bucket!="_admin"}[5m]))
            /
            clamp_min(sum(rate(strata_http_requests_total{bucket!="_admin"}[5m])), 1)
          )

      # Latency: p99 over GET + PUT across all S3 buckets.
      - record: strata:latency_get_put:p99_rate5m
        expr: histogram_quantile(0.99, sum by (le) (rate(strata_http_request_duration_seconds_bucket{method=~"GET|PUT"}[5m])))

      # Durability: rate of non-ENOENT non-OK terminal GC acks. Always-on
      # signal — no inventory dependency. Powers the 90-day durability SLO
      # (see /operate/slo.md).
      - record: strata:durability:error_rate5m
        expr: sum(rate(strata_gc_terminal_ack_total{reason!="enoent",reason!="ok"}[5m]))

      # ---- Per-window SLI ratios (US-003 burn-rate) ---------------------
      # Long-window SLI ratios for 4-window multi-burn-rate alerts. 5m
      # short window above pairs with these. 30m + 3d windows are inlined
      # in the burn-rate alert expressions (windows the Google SRE workbook
      # uses as the "secondary short" / "secondary long" pair members).
      - record: strata:availability:ratio_rate1h
        expr: |
          1 - (
            sum(rate(strata_http_requests_total{code=~"5..",bucket!="_admin"}[1h]))
            /
            clamp_min(sum(rate(strata_http_requests_total{bucket!="_admin"}[1h])), 1)
          )
      - record: strata:availability:ratio_rate6h
        expr: |
          1 - (
            sum(rate(strata_http_requests_total{code=~"5..",bucket!="_admin"}[6h]))
            /
            clamp_min(sum(rate(strata_http_requests_total{bucket!="_admin"}[6h])), 1)
          )
      - record: strata:availability:ratio_rate1d
        expr: |
          1 - (
            sum(rate(strata_http_requests_total{code=~"5..",bucket!="_admin"}[1d]))
            /
            clamp_min(sum(rate(strata_http_requests_total{bucket!="_admin"}[1d])), 1)
          )

      - record: strata:latency_get_put:p99_rate1h
        expr: histogram_quantile(0.99, sum by (le) (rate(strata_http_request_duration_seconds_bucket{method=~"GET|PUT"}[1h])))
      - record: strata:latency_get_put:p99_rate6h
        expr: histogram_quantile(0.99, sum by (le) (rate(strata_http_request_duration_seconds_bucket{method=~"GET|PUT"}[6h])))
      - record: strata:latency_get_put:p99_rate1d
        expr: histogram_quantile(0.99, sum by (le) (rate(strata_http_request_duration_seconds_bucket{method=~"GET|PUT"}[1d])))

      - record: strata:durability:error_rate1h
        expr: sum(rate(strata_gc_terminal_ack_total{reason!="enoent",reason!="ok"}[1h]))
      - record: strata:durability:error_rate6h
        expr: sum(rate(strata_gc_terminal_ack_total{reason!="enoent",reason!="ok"}[6h]))
      - record: strata:durability:error_rate1d
        expr: sum(rate(strata_gc_terminal_ack_total{reason!="enoent",reason!="ok"}[1d]))

  - name: strata.availability
    interval: 30s
    rules:
      - alert: Strata5xxRateHigh
        expr: (1 - strata:availability:ratio_rate5m) > (1 - strata:slo_availability:target) * 14.4
        for: 5m
        labels:
          severity: critical
          team: storage
          slo: availability
        annotations:
          summary: Strata 5xx rate burning availability SLO at >=14.4× budget
          description: |
            5m availability ratio {{ printf "%.4f" $value }} below SLO target.
            Burning error budget at >=14.4× — at this rate the 30-day budget
            is consumed in ~2 days. Investigate gateway / backend errors
            via /admin/v1/diagnostics + recent logs.
          runbook_url: /operate/alerts.md#strata5xxratehigh

  - name: strata.latency
    interval: 30s
    rules:
      - alert: StrataLatencyP99Above500ms
        expr: strata:latency_get_put:p99_rate5m > strata:slo_latency_get_put_seconds:target
        for: 5m
        labels:
          severity: warning
          team: storage
          slo: latency
        annotations:
          summary: GET/PUT p99 latency above SLO target
          description: |
            5m p99 GET/PUT latency {{ printf "%.3fs" $value }} above SLO
            target 500ms. Investigate hot buckets, slow backend ops via
            /admin/v1/diagnostics + the latency dashboard.
          runbook_url: /operate/alerts.md#stratalatencyp99above500ms

  - name: strata.workers
    interval: 30s
    rules:
      - alert: StrataWorkerPanic
        expr: rate(strata_worker_panic_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          team: storage
        annotations:
          summary: Worker {{ $labels.worker }} (shard {{ $labels.shard }}) panicked
          description: |
            Recovered worker panic on worker={{ $labels.worker }} shard={{ $labels.shard }}.
            Supervisor restarts on exponential backoff (1s→5s→30s→2m).
            Check the worker iteration span + logs for the panic stack.
          runbook_url: /operate/alerts.md#strataworkerpanic

      - alert: StrataGCQueueGrowth
        expr: max by (region) (deriv(strata_gc_queue_depth[15m])) > 0
        for: 15m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: GC queue depth growing in region {{ $labels.region }}
          description: |
            GC queue depth growing ({{ $value }}/s slope over 15m) in
            region={{ $labels.region }}. Either chunk deletion is failing
            (check strata_gc_terminal_ack_total) or producer rate exceeds
            consumer capacity (consider scaling STRATA_GC_CONCURRENCY /
            STRATA_GC_SHARDS).
          runbook_url: /operate/alerts.md#stratagcqueuegrowth

      - alert: StrataLifecycleErrorSpike
        expr: sum(rate(strata_lifecycle_tick_total{status="error"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: Lifecycle worker error rate elevated
          description: |
            Lifecycle worker error rate {{ printf "%.3f" $value }}/s over 5m.
            Investigate per-action breakdown via
            sum by (action) (rate(strata_lifecycle_tick_total{status="error"}[5m])).
          runbook_url: /operate/alerts.md#stratalifecycleerrorspike

      - alert: StrataNotifyDLQGrowth
        expr: sum(rate(strata_notify_delivery_total{status="dlq"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: Notify worker DLQ accruing deliveries
          description: |
            Notify worker has shipped {{ printf "%.3f" $value }}/s deliveries
            to DLQ over 10m. Check sink reachability + DLQ contents via
            /admin/v1/notify/dlq.
          runbook_url: /operate/alerts.md#stratanotifydlqgrowth

      - alert: StrataHeartbeatStale
        expr: time() - max(strata_heartbeat_last_write_timestamp) > 60
        for: 2m
        labels:
          severity: critical
          team: storage
        annotations:
          summary: No replica has written heartbeat in >60s
          description: |
            Most recent heartbeat write was {{ printf "%.0f" $value }}s ago.
            Either meta backend is unhealthy (heartbeat write requires
            Cassandra/TiKV liveness) or every gateway replica has stalled.
            Check /readyz + meta backend status immediately.
          runbook_url: /operate/alerts.md#strataheartbeatstale

  - name: strata.replication
    interval: 30s
    rules:
      - alert: StrataReplicationQueueAge
        expr: max by (bucket) (strata_replication_queue_age_seconds) > 600
        for: 10m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: Replication queue oldest row >10m in bucket {{ $labels.bucket }}
          description: |
            Oldest pending replication_queue row in bucket={{ $labels.bucket }}
            is {{ printf "%.0f" $value }}s old. Peer reachability or
            replicator throughput is degraded.
          runbook_url: /operate/alerts.md#stratareplicationqueueage

      - alert: StrataReplicationQueueGrowth
        expr: max by (rule_id) (deriv(strata_replication_queue_depth[15m])) > 0
        for: 15m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: Replication queue depth growing for rule {{ $labels.rule_id }}
          description: |
            Replication queue depth for rule_id={{ $labels.rule_id }}
            growing at {{ printf "%.3f" $value }}/s slope over 15m.
            Producer rate exceeds replicator throughput.
          runbook_url: /operate/alerts.md#stratareplicationqueuegrowth

  - name: strata.backends
    interval: 30s
    rules:
      - alert: StrataCassandraLwtConflictSpike
        expr: sum by (bucket, shard) (rate(strata_cassandra_lwt_conflicts_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: Cassandra LWT conflicts spiking on bucket {{ $labels.bucket }} shard {{ $labels.shard }}
          description: |
            LWT conflict rate {{ printf "%.1f" $value }}/s on
            bucket={{ $labels.bucket }} shard={{ $labels.shard }} over 5m.
            Hot key — investigate per-bucket Hot Shards heatmap.
          runbook_url: /operate/alerts.md#stratacassandralwtconflictspike

      - alert: StrataCassandraQueryP99Spike
        expr: histogram_quantile(0.99, sum by (le, table, op) (rate(strata_cassandra_query_duration_seconds_bucket[5m]))) > 0.1
        for: 5m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: Cassandra p99 query latency >100ms (table={{ $labels.table }} op={{ $labels.op }})
          description: |
            Cassandra p99 query latency {{ printf "%.3fs" $value }} on
            table={{ $labels.table }} op={{ $labels.op }}. Investigate
            slow-query log (STRATA_CASSANDRA_SLOW_MS) + cluster health.
          runbook_url: /operate/alerts.md#stratacassandraqueryp99spike

      - alert: StrataRADOSOpP99Spike
        expr: histogram_quantile(0.99, sum by (le, pool, op) (rate(strata_rados_op_duration_seconds_bucket[5m]))) > 0.5
        for: 5m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: RADOS p99 op latency >500ms (pool={{ $labels.pool }} op={{ $labels.op }})
          description: |
            RADOS p99 op latency {{ printf "%.3fs" $value }} on
            pool={{ $labels.pool }} op={{ $labels.op }}. Investigate
            cluster OSD health + recovery state.
          runbook_url: /operate/alerts.md#strataradosopp99spike

      - alert: StrataBucketStatsShardImbalance
        expr: max(strata_bucket_stats_shard_writes_total) / clamp_min(sum(strata_bucket_stats_shard_writes_total), 1) > 0.5
        for: 30m
        labels:
          severity: info
          team: storage
        annotations:
          summary: bucket_stats shard fan-out imbalanced (one shard owns >50% of writes)
          description: |
            One bucket_stats shard absorbed {{ printf "%.2f" $value }}
            fraction of writes over 30m (>0.50 is the fan-out warning
            line). Picker likely hashing on a stable key instead of a
            fresh uuid. See CLAUDE.md `bucket_stats live counter is
            fan-out, not single-key`.
          runbook_url: /operate/alerts.md#stratabucketstatsshardimbalance

      - alert: StrataOTelRingbufHorizonLow
        expr: strata_otel_ringbuf_oldest_age_seconds < 300
        for: 5m
        labels:
          severity: info
          team: storage
        annotations:
          summary: OTel ringbuf retention horizon <5min
          description: |
            OTel ring buffer oldest trace age {{ printf "%.0f" $value }}s.
            Trace browser will miss older requests under load — consider
            growing STRATA_OTEL_RINGBUF_BYTES.
          runbook_url: /operate/alerts.md#strataotelringbufhorizonlow

  - name: strata.security
    interval: 30s
    rules:
      - alert: StrataBackendTLSSkipVerify
        expr: sum(strata_backend_tls_skip_verify) > 0
        for: 1m
        labels:
          severity: critical
          team: storage
        annotations:
          summary: Backend TLS InsecureSkipVerify=true in production
          description: |
            {{ printf "%.0f" $value }} backend TLS clients have
            InsecureSkipVerify=true. Server-cert validation is OFF —
            traffic is vulnerable to MITM. Re-issue trusted CA bundle +
            unset STRATA_*_TLS_SKIP_VERIFY immediately.
          runbook_url: /operate/alerts.md#stratabackendtlsskipverify

      - alert: StrataRateLimitRefusalSpike
        expr: sum(rate(strata_ingress_rate_limit_refused_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: Ingress rate-limit refusals spiking (>10/s)
          description: |
            Ingress rate limiter refused {{ printf "%.1f" $value }}/s
            requests over 5m. Either a misbehaving client / DDoS or limits
            tuned too tight. Inspect by (reason) and consider scaling
            STRATA_RATE_LIMIT_PER_*.
          runbook_url: /operate/alerts.md#strataratelimitrefusalspike

      - alert: StrataAuditStreamSubscriberLeak
        expr: strata_audit_stream_subscribers > 50
        for: 10m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: Audit stream subscribers >50 (likely leak)
          description: |
            Audit stream broadcaster has {{ printf "%.0f" $value }} live
            subscribers. Operator dashboards rarely exceed ~5; this
            indicates leaked /admin/v1/audit/stream connections.
          runbook_url: /operate/alerts.md#strataauditstreamsubscriberleak

  - name: strata.drain
    interval: 30s
    rules:
      - alert: StrataDrainProgressStalled
        expr: (sum(changes(strata_rebalance_chunks_moved_total[15m])) == 0) and on() (sum(strata_drain_complete_total) == 0)
        for: 15m
        labels:
          severity: warning
          team: storage
        annotations:
          summary: Drain progress stalled (no chunk moves in 15m, no completion)
          description: |
            Rebalance worker has moved zero chunks over 15m and no drain
            completion event has fired. Check /admin/v1/clusters drain
            state + per-cluster drain-progress for stuck buckets
            (stuck_single_policy / stuck_no_policy).
          runbook_url: /operate/alerts.md#stratadrainprogressstalled

  # ----------------------------------------------------------------------
  # Burn-rate alerts (US-003) — 4 windows × 3 SLOs = 12 alerts.
  #
  # Google SRE workbook ch.5 multi-window multi-burn-rate (MWMBR):
  #   * 5m + 1h    @ 14.4× — page critical (2m). 30-day budget burned in ~2d.
  #   * 30m + 6h   @ 6×    — page critical (15m). Budget burned in ~5d.
  #   * 6h  + 1d   @ 3×    — ticket warning (1h). Budget burned in ~10d.
  #   * 24h + 3d   @ 1×    — ticket info (3h). Budget meets SLO floor.
  #
  # Both windows must breach the multiplier-scaled threshold simultaneously
  # → noise suppression without sacrificing latency-to-alert. Recording
  # rules from strata.recording above carry the 5m / 1h / 6h / 1d windows;
  # 30m + 3d windows are inlined here (omitted from recording rules to
  # keep the rule count tight at 17 — matches PRD AC's 8 + 9 budget).
  # ----------------------------------------------------------------------
  - name: strata.burn_rate
    interval: 30s
    rules:
      # ---- Availability SLO --------------------------------------------
      - alert: StrataAvailabilityBurnRateFast
        expr: |
          (1 - strata:availability:ratio_rate5m) > (1 - strata:slo_availability:target) * 14.4
          and
          (1 - strata:availability:ratio_rate1h) > (1 - strata:slo_availability:target) * 14.4
        for: 2m
        labels:
          severity: critical
          team: storage
          slo: availability
          burn_window: 5m_1h
          burn_rate: "14.4"
        annotations:
          summary: Availability SLO burning at >=14.4× budget (5m+1h windows)
          description: |
            5m error fraction {{ printf "%.4f" $value }} and 1h error
            fraction both exceed 14.4× the SLO error budget. At this rate
            the 30-day budget burns in ~2 days. Page on-call immediately.
          error_budget_remaining_pct: |
            PromQL: 100 * (1 - (
              sum(increase(strata_http_requests_total{code=~"5..",bucket!="_admin"}[30d]))
              /
              clamp_min(sum(increase(strata_http_requests_total{bucket!="_admin"}[30d])), 1)
            ) / (1 - strata:slo_availability:target))
          runbook_url: /operate/alerts.md#strataavailabilityburnratefast

      - alert: StrataAvailabilityBurnRateMedium
        expr: |
          (
            sum(rate(strata_http_requests_total{code=~"5..",bucket!="_admin"}[30m]))
            /
            clamp_min(sum(rate(strata_http_requests_total{bucket!="_admin"}[30m])), 1)
          ) > (1 - strata:slo_availability:target) * 6
          and
          (1 - strata:availability:ratio_rate6h) > (1 - strata:slo_availability:target) * 6
        for: 15m
        labels:
          severity: critical
          team: storage
          slo: availability
          burn_window: 30m_6h
          burn_rate: "6"
        annotations:
          summary: Availability SLO burning at >=6× budget (30m+6h windows)
          description: |
            30m + 6h error fractions both exceed 6× the SLO error budget.
            Budget burns in ~5 days at this pace. Investigate before it
            escalates to the 14.4× page.
          error_budget_remaining_pct: |
            PromQL: 100 * (1 - (
              sum(increase(strata_http_requests_total{code=~"5..",bucket!="_admin"}[30d]))
              /
              clamp_min(sum(increase(strata_http_requests_total{bucket!="_admin"}[30d])), 1)
            ) / (1 - strata:slo_availability:target))
          runbook_url: /operate/alerts.md#strataavailabilityburnratemedium

      - alert: StrataAvailabilityBurnRateSlow
        expr: |
          (1 - strata:availability:ratio_rate6h) > (1 - strata:slo_availability:target) * 3
          and
          (1 - strata:availability:ratio_rate1d) > (1 - strata:slo_availability:target) * 3
        for: 1h
        labels:
          severity: warning
          team: storage
          slo: availability
          burn_window: 6h_1d
          burn_rate: "3"
        annotations:
          summary: Availability SLO burning at >=3× budget (6h+1d windows)
          description: |
            6h + 1d error fractions both exceed 3× the SLO error budget.
            Budget burns in ~10 days. Ticket-grade — schedule investigation
            before it accelerates.
          error_budget_remaining_pct: |
            PromQL: 100 * (1 - (
              sum(increase(strata_http_requests_total{code=~"5..",bucket!="_admin"}[30d]))
              /
              clamp_min(sum(increase(strata_http_requests_total{bucket!="_admin"}[30d])), 1)
            ) / (1 - strata:slo_availability:target))
          runbook_url: /operate/alerts.md#strataavailabilityburnrateslow

      - alert: StrataAvailabilityBurnRateBaseline
        expr: |
          (1 - strata:availability:ratio_rate1d) > (1 - strata:slo_availability:target) * 1
          and
          (
            sum(rate(strata_http_requests_total{code=~"5..",bucket!="_admin"}[3d]))
            /
            clamp_min(sum(rate(strata_http_requests_total{bucket!="_admin"}[3d])), 1)
          ) > (1 - strata:slo_availability:target) * 1
        for: 3h
        labels:
          severity: info
          team: storage
          slo: availability
          burn_window: 1d_3d
          burn_rate: "1"
        annotations:
          summary: Availability SLO burning at SLO floor (1d+3d windows)
          description: |
            1d + 3d error fractions both hover at the SLO floor — budget
            consumption tracks SLO target exactly. Worth observing trend;
            no immediate action.
          error_budget_remaining_pct: |
            PromQL: 100 * (1 - (
              sum(increase(strata_http_requests_total{code=~"5..",bucket!="_admin"}[30d]))
              /
              clamp_min(sum(increase(strata_http_requests_total{bucket!="_admin"}[30d])), 1)
            ) / (1 - strata:slo_availability:target))
          runbook_url: /operate/alerts.md#strataavailabilityburnratebaseline

      # ---- Latency SLO -------------------------------------------------
      - alert: StrataLatencyBurnRateFast
        expr: |
          strata:latency_get_put:p99_rate5m > strata:slo_latency_get_put_seconds:target * 14.4
          and
          strata:latency_get_put:p99_rate1h > strata:slo_latency_get_put_seconds:target * 14.4
        for: 2m
        labels:
          severity: critical
          team: storage
          slo: latency
          burn_window: 5m_1h
          burn_rate: "14.4"
        annotations:
          summary: GET/PUT p99 latency at >=14.4× SLO target (5m+1h windows)
          description: |
            5m p99 latency {{ printf "%.3fs" $value }} and 1h p99 both
            exceed 14.4× the 500ms SLO target. Severe budget burn — page
            on-call.
          error_budget_remaining_pct: |
            PromQL: 100 * (1 - (
              histogram_quantile(0.99, sum by (le) (rate(strata_http_request_duration_seconds_bucket{method=~"GET|PUT"}[30d])))
              / strata:slo_latency_get_put_seconds:target
            ))
          runbook_url: /operate/alerts.md#stratalatencyburnratefast

      - alert: StrataLatencyBurnRateMedium
        expr: |
          histogram_quantile(0.99, sum by (le) (rate(strata_http_request_duration_seconds_bucket{method=~"GET|PUT"}[30m]))) > strata:slo_latency_get_put_seconds:target * 6
          and
          strata:latency_get_put:p99_rate6h > strata:slo_latency_get_put_seconds:target * 6
        for: 15m
        labels:
          severity: critical
          team: storage
          slo: latency
          burn_window: 30m_6h
          burn_rate: "6"
        annotations:
          summary: GET/PUT p99 latency at >=6× SLO target (30m+6h windows)
          description: |
            30m + 6h p99 latency both exceed 6× the 500ms SLO target.
            Sustained slowness — page on-call before it escalates.
          error_budget_remaining_pct: |
            PromQL: 100 * (1 - (
              histogram_quantile(0.99, sum by (le) (rate(strata_http_request_duration_seconds_bucket{method=~"GET|PUT"}[30d])))
              / strata:slo_latency_get_put_seconds:target
            ))
          runbook_url: /operate/alerts.md#stratalatencyburnratemedium

      - alert: StrataLatencyBurnRateSlow
        expr: |
          strata:latency_get_put:p99_rate6h > strata:slo_latency_get_put_seconds:target * 3
          and
          strata:latency_get_put:p99_rate1d > strata:slo_latency_get_put_seconds:target * 3
        for: 1h
        labels:
          severity: warning
          team: storage
          slo: latency
          burn_window: 6h_1d
          burn_rate: "3"
        annotations:
          summary: GET/PUT p99 latency at >=3× SLO target (6h+1d windows)
          description: |
            6h + 1d p99 latency both exceed 3× the 500ms SLO target.
            Ticket-grade — investigate hot buckets / slow backend ops.
          error_budget_remaining_pct: |
            PromQL: 100 * (1 - (
              histogram_quantile(0.99, sum by (le) (rate(strata_http_request_duration_seconds_bucket{method=~"GET|PUT"}[30d])))
              / strata:slo_latency_get_put_seconds:target
            ))
          runbook_url: /operate/alerts.md#stratalatencyburnrateslow

      - alert: StrataLatencyBurnRateBaseline
        expr: |
          strata:latency_get_put:p99_rate1d > strata:slo_latency_get_put_seconds:target * 1
          and
          histogram_quantile(0.99, sum by (le) (rate(strata_http_request_duration_seconds_bucket{method=~"GET|PUT"}[3d]))) > strata:slo_latency_get_put_seconds:target * 1
        for: 3h
        labels:
          severity: info
          team: storage
          slo: latency
          burn_window: 1d_3d
          burn_rate: "1"
        annotations:
          summary: GET/PUT p99 latency at SLO target (1d+3d windows)
          description: |
            1d + 3d p99 latency hover at the 500ms SLO target. Track the
            trend — no immediate action required.
          error_budget_remaining_pct: |
            PromQL: 100 * (1 - (
              histogram_quantile(0.99, sum by (le) (rate(strata_http_request_duration_seconds_bucket{method=~"GET|PUT"}[30d])))
              / strata:slo_latency_get_put_seconds:target
            ))
          runbook_url: /operate/alerts.md#stratalatencyburnratebaseline

      # ---- Durability SLO ----------------------------------------------
      # SLO target is 0 errors/s. Multiplier × 0 = 0, so the literal
      # multi-window check reduces to "error rate is non-zero over both
      # windows" — multi-window framing still suppresses noise (single
      # blip on either window cancels) while preserving zero-tolerance
      # semantics. Severity escalates by window pair (slow-burn ticket vs
      # fast-burn page) so operators distinguish steady-state errors from
      # sudden onset.
      - alert: StrataDurabilityBurnRateFast
        expr: |
          strata:durability:error_rate5m > strata:slo_durability_error_rate:target * 14.4
          and
          strata:durability:error_rate1h > strata:slo_durability_error_rate:target * 14.4
        for: 2m
        labels:
          severity: critical
          team: storage
          slo: durability
          burn_window: 5m_1h
          burn_rate: "14.4"
        annotations:
          summary: Durability terminal-ack error rate non-zero (5m+1h windows)
          description: |
            Non-ENOENT non-OK terminal GC acks fired in both 5m and 1h
            windows ({{ printf "%.4f" $value }}/s at 5m). Chunk deletion is
            failing — data could be at risk. Page on-call.
          error_budget_remaining_pct: |
            PromQL: 100 (zero-tolerance SLO; any persistent error consumes
            full budget). Inspect via
            sum by (reason) (rate(strata_gc_terminal_ack_total{reason!="enoent",reason!="ok"}[1h]))
          runbook_url: /operate/alerts.md#stratadurabilityburnratefast

      - alert: StrataDurabilityBurnRateMedium
        expr: |
          sum(rate(strata_gc_terminal_ack_total{reason!="enoent",reason!="ok"}[30m])) > strata:slo_durability_error_rate:target * 6
          and
          strata:durability:error_rate6h > strata:slo_durability_error_rate:target * 6
        for: 15m
        labels:
          severity: critical
          team: storage
          slo: durability
          burn_window: 30m_6h
          burn_rate: "6"
        annotations:
          summary: Durability terminal-ack error rate non-zero (30m+6h windows)
          description: |
            Non-ENOENT non-OK terminal GC acks persist across 30m + 6h
            windows. Sustained chunk-delete failures — escalate before
            5m+1h breaks.
          error_budget_remaining_pct: |
            PromQL: 100 (zero-tolerance SLO; inspect per-reason breakdown).
          runbook_url: /operate/alerts.md#stratadurabilityburnratemedium

      - alert: StrataDurabilityBurnRateSlow
        expr: |
          strata:durability:error_rate6h > strata:slo_durability_error_rate:target * 3
          and
          strata:durability:error_rate1d > strata:slo_durability_error_rate:target * 3
        for: 1h
        labels:
          severity: warning
          team: storage
          slo: durability
          burn_window: 6h_1d
          burn_rate: "3"
        annotations:
          summary: Durability terminal-ack error rate non-zero (6h+1d windows)
          description: |
            Non-ENOENT non-OK terminal GC acks persist across 6h + 1d
            windows. Ticket-grade — schedule per-reason root cause.
          error_budget_remaining_pct: |
            PromQL: 100 (zero-tolerance SLO; inspect per-reason breakdown).
          runbook_url: /operate/alerts.md#stratadurabilityburnrateslow

      - alert: StrataDurabilityBurnRateBaseline
        expr: |
          strata:durability:error_rate1d > strata:slo_durability_error_rate:target * 1
          and
          sum(rate(strata_gc_terminal_ack_total{reason!="enoent",reason!="ok"}[3d])) > strata:slo_durability_error_rate:target * 1
        for: 3h
        labels:
          severity: info
          team: storage
          slo: durability
          burn_window: 1d_3d
          burn_rate: "1"
        annotations:
          summary: Durability terminal-ack error rate non-zero (1d+3d windows)
          description: |
            Non-ENOENT non-OK terminal GC acks observed across 1d + 3d
            windows. Long-tail trend — observe; investigate if pattern
            persists across cycles.
          error_budget_remaining_pct: |
            PromQL: 100 (zero-tolerance SLO; inspect per-reason breakdown).
          runbook_url: /operate/alerts.md#stratadurabilityburnratebaseline
