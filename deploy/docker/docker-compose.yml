services:
  cassandra:
    image: cassandra:5.0
    container_name: strata-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: strata
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 1G
    volumes:
      - strata-cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  ceph:
    build:
      context: ceph-bootstrap
      dockerfile: Dockerfile
    image: strata-ceph:local
    container_name: strata-ceph
    hostname: ceph
    environment:
      MON_NAME: ceph
      MEMSTORE_BYTES: "4294967296"
      STRATA_POOL: strata.rgw.buckets.data
      STRATA_EXTRA_POOLS: "strata.rgw.buckets.ia strata.rgw.buckets.cold"
    volumes:
      - strata-ceph-etc:/etc/ceph
      - strata-ceph-data:/var/lib/ceph
    healthcheck:
      test: ["CMD-SHELL", "ceph -s 2>/dev/null | grep -qE 'HEALTH_(OK|WARN)' && ceph osd pool ls 2>/dev/null | grep -q strata.rgw.buckets.data"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  # Second RADOS cluster for multi-cluster lab (per-bucket placement policy +
  # rebalance worker). Profile-gated — enable with `--profile multi-cluster`.
  # Independent FSID + MON + memstore; pools identical to primary so rebalance
  # can target the same class names.
  ceph-b:
    build:
      context: ceph-bootstrap
      dockerfile: Dockerfile
    image: strata-ceph:local
    container_name: strata-cephb
    hostname: cephb
    profiles: ["multi-cluster"]
    environment:
      MON_NAME: cephb
      MEMSTORE_BYTES: "4294967296"
      STRATA_POOL: strata.rgw.buckets.data
      STRATA_EXTRA_POOLS: "strata.rgw.buckets.ia strata.rgw.buckets.cold"
    volumes:
      - strata-cephb-etc:/etc/ceph
      - strata-cephb-data:/var/lib/ceph
    healthcheck:
      test: ["CMD-SHELL", "ceph -s 2>/dev/null | grep -qE 'HEALTH_(OK|WARN)' && ceph osd pool ls 2>/dev/null | grep -q strata.rgw.buckets.data"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  # Single unified strata service: gateway + opt-in workers selected via
  # STRATA_WORKERS. Default stack runs gc + lifecycle. The wider feature
  # workers (notify / replicator / access-log / inventory / audit-export)
  # live behind the `features` profile on the strata-features service.
  strata:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: strata:ceph
    container_name: strata
    depends_on:
      cassandra:
        condition: service_healthy
      ceph:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_WORKERS: ${STRATA_WORKERS:-gc,lifecycle}
      # overrides for local experimentation (auth on/off, alt classes, ...)
      STRATA_AUTH_MODE: ${STRATA_AUTH_MODE:-}
      STRATA_STATIC_CREDENTIALS: ${STRATA_STATIC_CREDENTIALS:-}
      STRATA_GC_INTERVAL: ${STRATA_GC_INTERVAL:-}
      STRATA_GC_GRACE: ${STRATA_GC_GRACE:-}
      STRATA_LIFECYCLE_INTERVAL: ${STRATA_LIFECYCLE_INTERVAL:-}
      STRATA_LIFECYCLE_UNIT: ${STRATA_LIFECYCLE_UNIT:-}
      STRATA_NOTIFY_TARGETS: ${STRATA_NOTIFY_TARGETS:-}
      STRATA_PROMETHEUS_URL: ${STRATA_PROMETHEUS_URL:-http://prometheus:9090}
    ports:
      - "9999:9000"
    volumes:
      - strata-ceph-etc:/etc/ceph:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Optional second strata replica that hosts the feature workers
  # (notify / replicator / access-log / inventory / audit-export). Enable
  # with `docker compose --profile features up strata-features`.
  # Each worker still leader-elects on its own lease so the primary strata
  # service may run the same names without conflict.
  strata-features:
    image: strata:ceph
    container_name: strata-features
    profiles: ["features"]
    depends_on:
      cassandra:
        condition: service_healthy
      ceph:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_WORKERS: ${STRATA_FEATURES_WORKERS:-notify,replicator,access-log,inventory,audit-export}
      STRATA_NOTIFY_TARGETS: ${STRATA_NOTIFY_TARGETS:-}
      STRATA_AUDIT_EXPORT_BUCKET: ${STRATA_AUDIT_EXPORT_BUCKET:-}
      STRATA_INVENTORY_REGION: ${STRATA_INVENTORY_REGION:-}
    volumes:
      - strata-ceph-etc:/etc/ceph:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
    restart: unless-stopped

  # Multi-cluster lab gateway. Mounts BOTH ceph etc volumes at distinct paths
  # and points STRATA_RADOS_CLUSTERS at them so the gateway sees two clusters
  # ("ceph-a" + "ceph-b"). Enable with `docker compose --profile multi-cluster
  # up -d`. Coexists with the default `strata` service (which keeps mounting
  # only the primary etc volume) — port 9998 to avoid the 9999 clash.
  strata-multi:
    image: strata:ceph
    container_name: strata-multi
    profiles: ["multi-cluster"]
    depends_on:
      cassandra:
        condition: service_healthy
      ceph:
        condition: service_healthy
      ceph-b:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_WORKERS: ${STRATA_WORKERS:-gc,lifecycle,rebalance}
      STRATA_RADOS_CLUSTERS: "default:/etc/ceph-a/ceph.conf:/etc/ceph-a/ceph.client.admin.keyring,cephb:/etc/ceph-b/ceph.conf:/etc/ceph-b/ceph.client.admin.keyring"
      STRATA_RADOS_CONF: "/etc/ceph-a/ceph.conf"
      STRATA_RADOS_KEYRING: "/etc/ceph-a/ceph.client.admin.keyring"
      STRATA_AUTH_MODE: ${STRATA_AUTH_MODE:-off}
      STRATA_STATIC_CREDENTIALS: ${STRATA_STATIC_CREDENTIALS:-}
      STRATA_PROMETHEUS_URL: ${STRATA_PROMETHEUS_URL:-http://prometheus:9090}
    ports:
      - "9998:9000"
    volumes:
      - strata-ceph-etc:/etc/ceph:ro
      - strata-ceph-etc:/etc/ceph-a:ro
      - strata-cephb-etc:/etc/ceph-b:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Webhook receiver used by the e2e-full CI job to verify the notify worker
  # round-trip. Lives behind the `features` profile so the default stack does
  # not pull it. Strata reaches it on the compose default network at
  # http://webhook-trap:8080/. Logs are JSON to stdout so CI can grep
  # `docker logs strata-webhook-trap` for the delivered event.
  webhook-trap:
    image: mendhak/http-https-echo:34
    container_name: strata-webhook-trap
    profiles: ["features"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: strata-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=24h"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - strata-prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: strata-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ../grafana/datasource.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ../grafana/dashboard.yaml:/etc/grafana/provisioning/dashboards/strata.yaml:ro
      - ../grafana/strata-dashboard.json:/var/lib/grafana/dashboards/strata-dashboard.json:ro
      - strata-grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

  # PD + TiKV + a TiKV-backed strata replica live behind the "tikv" profile
  # so the default `docker compose up` keeps the cassandra-backed shape.
  # Enable with:
  #   docker compose --profile tikv up -d pd tikv ceph strata-tikv prometheus grafana
  # or `make up-tikv`. The tikv-backed strata replica is mutually exclusive
  # with the cassandra-backed one (both want STRATA_META_BACKEND, but only
  # one value is legal per process — the picker in internal/serverapp
  # validates exactly-one). For laptop / CI the shape is single-PD +
  # single-TiKV; production needs PD ≥3 (raft majority) + TiKV ≥3 — see
  # docs/site/content/architecture/backends/tikv.md (US-019).
  pd:
    image: pingcap/pd:v8.5.0
    container_name: strata-pd
    profiles: ["tikv", "lab-tikv"]
    command:
      - --name=pd
      - --client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://pd:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
      - --data-dir=/data/pd
    ports:
      - "2379:2379"
    volumes:
      - strata-pd-data:/data
    healthcheck:
      # /pd/api/v1/health returns 200 when the PD process is up and the API
      # is serving — sufficient for single-PD lab readiness gating.
      # NB: `wget --spider` sends HEAD which PD doesn't accept (exit 8);
      # GET + discard exits 0 on 2xx and is the portable shape.
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=2 http://127.0.0.1:2379/pd/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  tikv:
    image: pingcap/tikv:v8.5.0
    container_name: strata-tikv-storage
    profiles: ["tikv", "lab-tikv"]
    depends_on:
      pd:
        condition: service_healthy
    command:
      - --pd-endpoints=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --status-addr=0.0.0.0:20180
      - --advertise-status-addr=tikv:20180
      - --data-dir=/data/tikv
    ports:
      - "20160:20160"
    volumes:
      - strata-tikv-data:/data
    # No HTTP healthcheck: pingcap/tikv's status server returns plain text
    # and the alpine-glibc base ships no curl. wget against /status mostly
    # works but the response body is not a stable contract. depends_on
    # `service_started` is enough for downstream consumers — the strata
    # gateway's TiKV client retries until PD assigns regions, so transient
    # boot races are absorbed there.
    restart: unless-stopped

  # strata-tikv is the TiKV-backed gateway replica. Mutually exclusive with
  # the cassandra-backed `strata` service: both bind the same listen port
  # internally, but the host port differs (9998 vs 9999) so a curious
  # operator can run both side-by-side under `--profile tikv` if they
  # really want to compare shapes.
  strata-tikv:
    image: strata:ceph
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: strata-tikv
    profiles: ["tikv"]
    depends_on:
      pd:
        condition: service_healthy
      tikv:
        condition: service_started
      ceph:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_META_BACKEND: tikv
      STRATA_TIKV_PD_ENDPOINTS: pd:2379
      STRATA_WORKERS: ${STRATA_WORKERS:-gc,lifecycle}
      STRATA_AUTH_MODE: ${STRATA_AUTH_MODE:-}
      STRATA_STATIC_CREDENTIALS: ${STRATA_STATIC_CREDENTIALS:-}
      STRATA_GC_INTERVAL: ${STRATA_GC_INTERVAL:-}
      STRATA_GC_GRACE: ${STRATA_GC_GRACE:-}
      STRATA_LIFECYCLE_INTERVAL: ${STRATA_LIFECYCLE_INTERVAL:-}
      STRATA_LIFECYCLE_UNIT: ${STRATA_LIFECYCLE_UNIT:-}
      STRATA_NOTIFY_TARGETS: ${STRATA_NOTIFY_TARGETS:-}
      STRATA_PROMETHEUS_URL: ${STRATA_PROMETHEUS_URL:-http://prometheus:9090}
    ports:
      - "9998:9000"
    volumes:
      - strata-ceph-etc:/etc/ceph:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ------------------------------------------------------------------
  # lab-tikv profile: 2 TiKV-backed strata replicas behind nginx LB on
  # host port 9999. Use for the multi-replica HA scenarios in
  # docs/site/content/deploy/multi-replica.md (US-002..US-007). Bring up with:
  #   docker compose --profile lab-tikv up -d \
  #     pd tikv ceph strata-tikv-a strata-tikv-b strata-lb-nginx \
  #     prometheus grafana
  # or `make up-lab-tikv`. Both replicas share STRATA_STATIC_CREDENTIALS
  # / STRATA_AUTH_MODE / STRATA_TIKV_PD_ENDPOINTS / STRATA_WORKERS via
  # host env so cross-replica SigV4 verifies. Distinct STRATA_NODE_ID
  # keeps the heartbeat rows readable; distinct host ports (9001, 9002)
  # let smoke tests poke each replica directly.
  strata-tikv-a:
    image: strata:ceph
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: strata-tikv-a
    profiles: ["lab-tikv"]
    depends_on:
      pd:
        condition: service_healthy
      tikv:
        condition: service_started
      ceph:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_META_BACKEND: tikv
      STRATA_TIKV_PD_ENDPOINTS: ${STRATA_TIKV_PD_ENDPOINTS:-pd:2379}
      STRATA_NODE_ID: strata-a
      STRATA_WORKERS: ${STRATA_WORKERS:-gc,lifecycle}
      # `optional` (not `off`) so presigned URLs minted by the console
      # carry through to a real identity check at PUT time. With `off`
      # the gateway treats every request as anonymous and an admin-
      # owned bucket then ACL-denies the upload.
      STRATA_AUTH_MODE: ${STRATA_AUTH_MODE:-optional}
      STRATA_STATIC_CREDENTIALS: ${STRATA_STATIC_CREDENTIALS:-admin:adminpass:owner}
      STRATA_GC_INTERVAL: ${STRATA_GC_INTERVAL:-}
      STRATA_GC_GRACE: ${STRATA_GC_GRACE:-}
      STRATA_GC_SHARDS: ${STRATA_GC_SHARDS:-}
      STRATA_GC_CONCURRENCY: ${STRATA_GC_CONCURRENCY:-}
      STRATA_GC_DUAL_WRITE: ${STRATA_GC_DUAL_WRITE:-}
      STRATA_LIFECYCLE_INTERVAL: ${STRATA_LIFECYCLE_INTERVAL:-}
      STRATA_LIFECYCLE_UNIT: ${STRATA_LIFECYCLE_UNIT:-}
      STRATA_NOTIFY_TARGETS: ${STRATA_NOTIFY_TARGETS:-}
      STRATA_PROMETHEUS_URL: ${STRATA_PROMETHEUS_URL:-http://prometheus:9090}
    ports:
      - "9001:9000"
    volumes:
      - strata-ceph-etc:/etc/ceph:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
      - strata-jwt-shared:/etc/strata/jwt-shared
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  strata-tikv-b:
    image: strata:ceph
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: strata-tikv-b
    profiles: ["lab-tikv"]
    depends_on:
      pd:
        condition: service_healthy
      tikv:
        condition: service_started
      ceph:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_META_BACKEND: tikv
      STRATA_TIKV_PD_ENDPOINTS: ${STRATA_TIKV_PD_ENDPOINTS:-pd:2379}
      STRATA_NODE_ID: strata-b
      STRATA_WORKERS: ${STRATA_WORKERS:-gc,lifecycle}
      # See strata-tikv-a above for rationale on the `optional` default.
      STRATA_AUTH_MODE: ${STRATA_AUTH_MODE:-optional}
      STRATA_STATIC_CREDENTIALS: ${STRATA_STATIC_CREDENTIALS:-admin:adminpass:owner}
      STRATA_GC_INTERVAL: ${STRATA_GC_INTERVAL:-}
      STRATA_GC_GRACE: ${STRATA_GC_GRACE:-}
      STRATA_GC_SHARDS: ${STRATA_GC_SHARDS:-}
      STRATA_GC_CONCURRENCY: ${STRATA_GC_CONCURRENCY:-}
      STRATA_GC_DUAL_WRITE: ${STRATA_GC_DUAL_WRITE:-}
      STRATA_LIFECYCLE_INTERVAL: ${STRATA_LIFECYCLE_INTERVAL:-}
      STRATA_LIFECYCLE_UNIT: ${STRATA_LIFECYCLE_UNIT:-}
      STRATA_NOTIFY_TARGETS: ${STRATA_NOTIFY_TARGETS:-}
      STRATA_PROMETHEUS_URL: ${STRATA_PROMETHEUS_URL:-http://prometheus:9090}
    ports:
      - "9002:9000"
    volumes:
      - strata-ceph-etc:/etc/ceph:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
      - strata-jwt-shared:/etc/strata/jwt-shared
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # 3rd lab-tikv replica behind the `lab-tikv-3` profile (US-006 Phase 2 bench
  # rerun). Operators stand up the 3-replica stack with
  # `make up-lab-tikv-3` (which expands to a docker compose call layering both
  # lab-tikv profiles), set `STRATA_GC_SHARDS=3` in the host env, then drive
  # `make bench-gc-multi` / `make bench-lifecycle-multi`.
  strata-tikv-c:
    image: strata:ceph
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: strata-tikv-c
    profiles: ["lab-tikv-3"]
    depends_on:
      pd:
        condition: service_healthy
      tikv:
        condition: service_started
      ceph:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_META_BACKEND: tikv
      STRATA_TIKV_PD_ENDPOINTS: ${STRATA_TIKV_PD_ENDPOINTS:-pd:2379}
      STRATA_NODE_ID: strata-c
      STRATA_WORKERS: ${STRATA_WORKERS:-gc,lifecycle}
      STRATA_AUTH_MODE: ${STRATA_AUTH_MODE:-optional}
      STRATA_STATIC_CREDENTIALS: ${STRATA_STATIC_CREDENTIALS:-admin:adminpass:owner}
      STRATA_GC_INTERVAL: ${STRATA_GC_INTERVAL:-}
      STRATA_GC_GRACE: ${STRATA_GC_GRACE:-}
      STRATA_GC_SHARDS: ${STRATA_GC_SHARDS:-}
      STRATA_GC_CONCURRENCY: ${STRATA_GC_CONCURRENCY:-}
      STRATA_GC_DUAL_WRITE: ${STRATA_GC_DUAL_WRITE:-}
      STRATA_LIFECYCLE_INTERVAL: ${STRATA_LIFECYCLE_INTERVAL:-}
      STRATA_LIFECYCLE_UNIT: ${STRATA_LIFECYCLE_UNIT:-}
      STRATA_NOTIFY_TARGETS: ${STRATA_NOTIFY_TARGETS:-}
      STRATA_PROMETHEUS_URL: ${STRATA_PROMETHEUS_URL:-http://prometheus:9090}
    ports:
      - "9003:9000"
    volumes:
      - strata-ceph-etc:/etc/ceph:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
      - strata-jwt-shared:/etc/strata/jwt-shared
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # nginx LB fronting both lab-tikv replicas at host port 9999. Wired in
  # US-003. Config lives in deploy/nginx/strata-lab.conf.
  strata-lb-nginx:
    image: nginx:1.27-alpine
    container_name: strata-lb-nginx
    profiles: ["lab-tikv"]
    depends_on:
      - strata-tikv-a
      - strata-tikv-b
    volumes:
      - ../nginx/strata-lab.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9999:80"
    restart: unless-stopped

  # OTLP collector + Jaeger live behind the "tracing" profile so the default
  # `docker compose up` does not pull them in. Enable with:
  #   docker compose --profile tracing up otel-collector jaeger
  # The gateway exports to OTLP/HTTP at otel-collector:4318; point the
  # gateway env (OTEL_EXPORTER_OTLP_ENDPOINT) at it to capture spans.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: strata-otel-collector
    profiles: ["tracing"]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ../otel/collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: strata-jaeger
    profiles: ["tracing"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"
    restart: unless-stopped

volumes:
  strata-cassandra-data:
  strata-ceph-etc:
  strata-ceph-data:
  strata-cephb-etc:
  strata-cephb-data:
  strata-pd-data:
  strata-tikv-data:
  strata-prometheus-data:
  strata-grafana-data:
  strata-jwt-shared:
