services:
  # Cassandra meta backend lives under `--profile cassandra`. Cassandra
  # remains first-class in code (internal/meta/cassandra/** + test-integration
  # testcontainers preserved); this profile only gates the lab compose shape.
  # Bring up with `make up-cassandra` or `docker compose --profile cassandra up -d`.
  cassandra:
    image: cassandra:5.0
    container_name: strata-cassandra-db
    profiles: ["cassandra"]
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: strata
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 1G
    volumes:
      - strata-cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  ceph:
    build:
      context: ceph-bootstrap
      dockerfile: Dockerfile
    image: strata-ceph:local
    container_name: strata-ceph
    hostname: ceph
    environment:
      MON_NAME: ceph
      MEMSTORE_BYTES: "4294967296"
      STRATA_POOL: strata.rgw.buckets.data
      STRATA_EXTRA_POOLS: "strata.rgw.buckets.ia strata.rgw.buckets.cold"
    # Pin static IP so the persisted ceph mon DB (`/var/lib/ceph/mon`)
    # binds to the same address on every cycle (US-005 of ralph/p1-fixes).
    # Compose-assigned IPs vary by container start order, leaving the mon
    # process stuck on "Cannot assign requested address" on cycle 2+.
    networks:
      default:
        ipv4_address: 192.168.224.10
    volumes:
      - strata-ceph-etc:/etc/ceph
      - strata-ceph-data:/var/lib/ceph
    healthcheck:
      test: ["CMD-SHELL", "ceph -s 2>/dev/null | grep -qE 'HEALTH_(OK|WARN)' && ceph osd pool ls 2>/dev/null | grep -q strata.rgw.buckets.data"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  # Second RADOS cluster — always-on member of the default stack so multi-
  # cluster behaviour (per-bucket placement policy + rebalance worker + drain
  # lifecycle) is exercised out of the box. Independent FSID + MON + memstore;
  # pools identical to primary so rebalance can target the same class names.
  ceph-b:
    build:
      context: ceph-bootstrap
      dockerfile: Dockerfile
    image: strata-ceph:local
    container_name: strata-cephb
    hostname: cephb
    environment:
      MON_NAME: cephb
      MEMSTORE_BYTES: "4294967296"
      STRATA_POOL: strata.rgw.buckets.data
      STRATA_EXTRA_POOLS: "strata.rgw.buckets.ia strata.rgw.buckets.cold"
    # Pin static IP — same reason as `ceph` above (US-005 of ralph/p1-fixes).
    networks:
      default:
        ipv4_address: 192.168.224.11
    volumes:
      - strata-cephb-etc:/etc/ceph
      - strata-cephb-data:/var/lib/ceph
    healthcheck:
      test: ["CMD-SHELL", "ceph -s 2>/dev/null | grep -qE 'HEALTH_(OK|WARN)' && ceph osd pool ls 2>/dev/null | grep -q strata.rgw.buckets.data"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  # PD + TiKV always-on. Bare `docker compose up -d` runs the TiKV-default
  # 2-replica lab; production needs PD ≥3 (raft majority) + TiKV ≥3 — see
  # docs/site/content/architecture/backends/tikv.md.
  pd:
    image: pingcap/pd:v8.5.0
    container_name: strata-pd
    command:
      - --name=pd
      - --client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://pd:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
      - --data-dir=/data/pd
    ports:
      - "2379:2379"
    volumes:
      - strata-pd-data:/data
    healthcheck:
      # /pd/api/v1/health returns 200 when the PD process is up and the API
      # is serving — sufficient for single-PD lab readiness gating.
      # NB: `wget --spider` sends HEAD which PD doesn't accept (exit 8);
      # GET + discard exits 0 on 2xx and is the portable shape.
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=2 http://127.0.0.1:2379/pd/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  tikv:
    image: pingcap/tikv:v8.5.0
    container_name: strata-tikv-storage
    depends_on:
      pd:
        condition: service_healthy
    # TiKV refuses to start unless it can open >=123880 file descriptors and
    # FATAL-crash-loops otherwise ("the maximum number of open file descriptors
    # is too small, got 65536, expect greater or equal to 123880"). The GitHub
    # Actions runner caps container nofile at 65536, so the cluster never
    # bootstrapped in CI (every gateway write hit NOT_BOOTSTRAPPED -> 500 /
    # read-timeout, failing both e2e jobs). Raise the limit explicitly; works on
    # any host regardless of the daemon default.
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    command:
      - --pd-endpoints=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --status-addr=0.0.0.0:20180
      - --advertise-status-addr=tikv:20180
      - --data-dir=/data/tikv
    ports:
      - "20160:20160"
    volumes:
      - strata-tikv-data:/data
    # No HTTP healthcheck: pingcap/tikv's status server returns plain text
    # and the alpine-glibc base ships no curl. wget against /status mostly
    # works but the response body is not a stable contract. depends_on
    # `service_started` is enough for downstream consumers — the strata
    # gateway's TiKV client retries until PD assigns regions, so transient
    # boot races are absorbed there.
    restart: unless-stopped

  # ------------------------------------------------------------------
  # TiKV-default 2-replica lab: strata-a + strata-b behind nginx LB on
  # host port 9999. Bare `docker compose up -d` brings up the full stack.
  # Both replicas mount BOTH RADOS clusters (ceph + ceph-b) so per-bucket
  # placement policy + rebalance + drain lifecycle are exercisable out of
  # the box. Distinct STRATA_NODE_ID per replica + shared strata-jwt-shared
  # volume so a session JWT minted by replica A validates on replica B
  # (round-robin LB requires cross-replica session validation).
  # Lab-friendly rebalance cadence: STRATA_REBALANCE_INTERVAL defaults to
  # 30s (gateway built-in is 5m, fine for prod but too slow for dev
  # iteration — operator spends minutes wondering why drain progress is
  # "scan pending"). Prod k8s manifests set their own value via env.
  # STRATA_REBALANCE_RATE_MB_S keeps the gateway default (100 MB/s) per-
  # replica — rate-limit knob (chunk move costs chunkSize × 2 tokens; with
  # 2 replicas the aggregate ceiling is ~2 × 100 = 200 MB/s read+write
  # split, ~100 MB/s effective forward migration on a chunk-by-chunk
  # basis). Operator overrides via STRATA_REBALANCE_RATE_MB_S env.
  strata-a:
    image: strata:ceph
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: strata-a
    depends_on:
      pd:
        condition: service_healthy
      tikv:
        condition: service_started
      ceph:
        condition: service_healthy
      ceph-b:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_META_BACKEND: tikv
      STRATA_TIKV_PD_ENDPOINTS: ${STRATA_TIKV_PD_ENDPOINTS:-pd:2379}
      STRATA_NODE_ID: strata-a
      STRATA_WORKERS: ${STRATA_WORKERS:-gc,lifecycle,rebalance}
      STRATA_RADOS_CLUSTERS: ${STRATA_RADOS_CLUSTERS:-default:/etc/ceph-a/ceph.conf:/etc/ceph-a/ceph.client.admin.keyring,cephb:/etc/ceph-b/ceph.conf:/etc/ceph-b/ceph.client.admin.keyring}
      STRATA_RADOS_CONF: "/etc/ceph-a/ceph.conf"
      STRATA_RADOS_KEYRING: "/etc/ceph-a/ceph.client.admin.keyring"
      STRATA_RADOS_CLASSES: ${STRATA_RADOS_CLASSES:-}
      STRATA_REBALANCE_INTERVAL: ${STRATA_REBALANCE_INTERVAL:-30s}
      STRATA_REBALANCE_RATE_MB_S: ${STRATA_REBALANCE_RATE_MB_S:-}
      STRATA_REBALANCE_INFLIGHT: ${STRATA_REBALANCE_INFLIGHT:-}
      # `optional` (not `off`) so presigned URLs minted by the console
      # carry through to a real identity check at PUT time. With `off`
      # the gateway treats every request as anonymous and an admin-
      # owned bucket then ACL-denies the upload.
      STRATA_AUTH_MODE: ${STRATA_AUTH_MODE:-optional}
      STRATA_STATIC_CREDENTIALS: ${STRATA_STATIC_CREDENTIALS:-admin:adminpass:owner}
      STRATA_GC_INTERVAL: ${STRATA_GC_INTERVAL:-}
      STRATA_GC_GRACE: ${STRATA_GC_GRACE:-}
      STRATA_GC_SHARDS: ${STRATA_GC_SHARDS:-}
      STRATA_GC_CONCURRENCY: ${STRATA_GC_CONCURRENCY:-}
      STRATA_GC_DUAL_WRITE: ${STRATA_GC_DUAL_WRITE:-}
      STRATA_LIFECYCLE_INTERVAL: ${STRATA_LIFECYCLE_INTERVAL:-}
      STRATA_LIFECYCLE_UNIT: ${STRATA_LIFECYCLE_UNIT:-}
      STRATA_NOTIFY_TARGETS: ${STRATA_NOTIFY_TARGETS:-}
      STRATA_PROMETHEUS_URL: ${STRATA_PROMETHEUS_URL:-http://prometheus:9090}
    ports:
      - "10001:9000"
    volumes:
      - strata-ceph-etc:/etc/ceph-a:ro
      - strata-cephb-etc:/etc/ceph-b:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
      - strata-jwt-shared:/etc/strata/jwt-shared
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  strata-b:
    image: strata:ceph
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: strata-b
    depends_on:
      pd:
        condition: service_healthy
      tikv:
        condition: service_started
      ceph:
        condition: service_healthy
      ceph-b:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_META_BACKEND: tikv
      STRATA_TIKV_PD_ENDPOINTS: ${STRATA_TIKV_PD_ENDPOINTS:-pd:2379}
      STRATA_NODE_ID: strata-b
      STRATA_WORKERS: ${STRATA_WORKERS:-gc,lifecycle,rebalance}
      STRATA_RADOS_CLUSTERS: ${STRATA_RADOS_CLUSTERS:-default:/etc/ceph-a/ceph.conf:/etc/ceph-a/ceph.client.admin.keyring,cephb:/etc/ceph-b/ceph.conf:/etc/ceph-b/ceph.client.admin.keyring}
      STRATA_RADOS_CONF: "/etc/ceph-a/ceph.conf"
      STRATA_RADOS_KEYRING: "/etc/ceph-a/ceph.client.admin.keyring"
      STRATA_RADOS_CLASSES: ${STRATA_RADOS_CLASSES:-}
      STRATA_REBALANCE_INTERVAL: ${STRATA_REBALANCE_INTERVAL:-30s}
      STRATA_REBALANCE_RATE_MB_S: ${STRATA_REBALANCE_RATE_MB_S:-}
      STRATA_REBALANCE_INFLIGHT: ${STRATA_REBALANCE_INFLIGHT:-}
      # See strata-a above for rationale on the `optional` default.
      STRATA_AUTH_MODE: ${STRATA_AUTH_MODE:-optional}
      STRATA_STATIC_CREDENTIALS: ${STRATA_STATIC_CREDENTIALS:-admin:adminpass:owner}
      STRATA_GC_INTERVAL: ${STRATA_GC_INTERVAL:-}
      STRATA_GC_GRACE: ${STRATA_GC_GRACE:-}
      STRATA_GC_SHARDS: ${STRATA_GC_SHARDS:-}
      STRATA_GC_CONCURRENCY: ${STRATA_GC_CONCURRENCY:-}
      STRATA_GC_DUAL_WRITE: ${STRATA_GC_DUAL_WRITE:-}
      STRATA_LIFECYCLE_INTERVAL: ${STRATA_LIFECYCLE_INTERVAL:-}
      STRATA_LIFECYCLE_UNIT: ${STRATA_LIFECYCLE_UNIT:-}
      STRATA_NOTIFY_TARGETS: ${STRATA_NOTIFY_TARGETS:-}
      STRATA_PROMETHEUS_URL: ${STRATA_PROMETHEUS_URL:-http://prometheus:9090}
    ports:
      - "10002:9000"
    volumes:
      - strata-ceph-etc:/etc/ceph-a:ro
      - strata-cephb-etc:/etc/ceph-b:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
      - strata-jwt-shared:/etc/strata/jwt-shared
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Third strata replica gated behind `--profile bench-3replica`. Used only
  # by the 3-replica rebalance bench (scripts/bench-rebalance-multi.sh
  # SHARDS=3 leg). Joins the same TiKV-backed locker pool so it races for
  # `rebalance-leader-{0,1,2}` leases alongside strata-a + strata-b. Not
  # added to the nginx LB upstream (LB stays on strata-a/b under the bare
  # default); the bench script does not need a third HTTP endpoint — the
  # rebalance worker shard fan-out runs over TiKV leases, independent of
  # HTTP routing. Operator bring-up:
  #   docker compose --profile bench-3replica up -d strata-c
  # Tear down with `make down` (the `down` target already enumerates
  # profile names; bench-3replica is appended).
  strata-c:
    image: strata:ceph
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: strata-c
    profiles: ["bench-3replica"]
    depends_on:
      pd:
        condition: service_healthy
      tikv:
        condition: service_started
      ceph:
        condition: service_healthy
      ceph-b:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_META_BACKEND: tikv
      STRATA_TIKV_PD_ENDPOINTS: ${STRATA_TIKV_PD_ENDPOINTS:-pd:2379}
      STRATA_NODE_ID: strata-c
      STRATA_WORKERS: ${STRATA_WORKERS:-gc,lifecycle,rebalance}
      STRATA_RADOS_CLUSTERS: ${STRATA_RADOS_CLUSTERS:-default:/etc/ceph-a/ceph.conf:/etc/ceph-a/ceph.client.admin.keyring,cephb:/etc/ceph-b/ceph.conf:/etc/ceph-b/ceph.client.admin.keyring}
      STRATA_RADOS_CONF: "/etc/ceph-a/ceph.conf"
      STRATA_RADOS_KEYRING: "/etc/ceph-a/ceph.client.admin.keyring"
      STRATA_RADOS_CLASSES: ${STRATA_RADOS_CLASSES:-}
      STRATA_REBALANCE_INTERVAL: ${STRATA_REBALANCE_INTERVAL:-30s}
      STRATA_REBALANCE_RATE_MB_S: ${STRATA_REBALANCE_RATE_MB_S:-}
      STRATA_REBALANCE_INFLIGHT: ${STRATA_REBALANCE_INFLIGHT:-}
      STRATA_AUTH_MODE: ${STRATA_AUTH_MODE:-optional}
      STRATA_STATIC_CREDENTIALS: ${STRATA_STATIC_CREDENTIALS:-admin:adminpass:owner}
      STRATA_GC_INTERVAL: ${STRATA_GC_INTERVAL:-}
      STRATA_GC_GRACE: ${STRATA_GC_GRACE:-}
      STRATA_GC_SHARDS: ${STRATA_GC_SHARDS:-}
      STRATA_GC_CONCURRENCY: ${STRATA_GC_CONCURRENCY:-}
      STRATA_GC_DUAL_WRITE: ${STRATA_GC_DUAL_WRITE:-}
      STRATA_LIFECYCLE_INTERVAL: ${STRATA_LIFECYCLE_INTERVAL:-}
      STRATA_LIFECYCLE_UNIT: ${STRATA_LIFECYCLE_UNIT:-}
      STRATA_NOTIFY_TARGETS: ${STRATA_NOTIFY_TARGETS:-}
      STRATA_PROMETHEUS_URL: ${STRATA_PROMETHEUS_URL:-http://prometheus:9090}
    ports:
      - "10003:9000"
    volumes:
      - strata-ceph-etc:/etc/ceph-a:ro
      - strata-cephb-etc:/etc/ceph-b:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
      - strata-jwt-shared:/etc/strata/jwt-shared
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # nginx LB fronting strata-a + strata-b at host port 9999. Config lives
  # in deploy/nginx/strata-lab.conf.
  strata-lb-nginx:
    image: nginx:1.27-alpine
    container_name: strata-lb-nginx
    depends_on:
      - strata-a
      - strata-b
    volumes:
      - ../nginx/strata-lab.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9999:80"
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Cassandra-backed regression lab under `--profile cassandra`. Single
  # replica on host port 9998; multi-cluster mounts mirror strata-a/b.
  # Cassandra meta backend remains first-class in code — this profile is
  # for the lab compose shape, not a backend deprecation.
  strata-cassandra:
    image: strata:ceph
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: strata-cassandra
    profiles: ["cassandra"]
    depends_on:
      cassandra:
        condition: service_healthy
      ceph:
        condition: service_healthy
      ceph-b:
        condition: service_healthy
    environment:
      STRATA_CONFIG_FILE: /etc/strata/strata.toml
      STRATA_META_BACKEND: cassandra
      STRATA_CASSANDRA_HOSTS: ${STRATA_CASSANDRA_HOSTS:-cassandra:9042}
      STRATA_NODE_ID: strata-cassandra
      STRATA_WORKERS: ${STRATA_WORKERS:-gc,lifecycle,rebalance}
      STRATA_RADOS_CLUSTERS: ${STRATA_RADOS_CLUSTERS:-default:/etc/ceph-a/ceph.conf:/etc/ceph-a/ceph.client.admin.keyring,cephb:/etc/ceph-b/ceph.conf:/etc/ceph-b/ceph.client.admin.keyring}
      STRATA_RADOS_CONF: "/etc/ceph-a/ceph.conf"
      STRATA_RADOS_KEYRING: "/etc/ceph-a/ceph.client.admin.keyring"
      STRATA_RADOS_CLASSES: ${STRATA_RADOS_CLASSES:-}
      STRATA_REBALANCE_INTERVAL: ${STRATA_REBALANCE_INTERVAL:-30s}
      STRATA_REBALANCE_RATE_MB_S: ${STRATA_REBALANCE_RATE_MB_S:-}
      STRATA_REBALANCE_INFLIGHT: ${STRATA_REBALANCE_INFLIGHT:-}
      STRATA_AUTH_MODE: ${STRATA_AUTH_MODE:-optional}
      STRATA_STATIC_CREDENTIALS: ${STRATA_STATIC_CREDENTIALS:-admin:adminpass:owner}
      STRATA_GC_INTERVAL: ${STRATA_GC_INTERVAL:-}
      STRATA_GC_GRACE: ${STRATA_GC_GRACE:-}
      STRATA_LIFECYCLE_INTERVAL: ${STRATA_LIFECYCLE_INTERVAL:-}
      STRATA_LIFECYCLE_UNIT: ${STRATA_LIFECYCLE_UNIT:-}
      STRATA_NOTIFY_TARGETS: ${STRATA_NOTIFY_TARGETS:-}
      STRATA_PROMETHEUS_URL: ${STRATA_PROMETHEUS_URL:-http://prometheus:9090}
    ports:
      - "9998:9000"
    volumes:
      - strata-ceph-etc:/etc/ceph-a:ro
      - strata-cephb-etc:/etc/ceph-b:ro
      - ../strata.toml:/etc/strata/strata.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Ceph RGW container under `--profile bench-rgw` — comparison target for the
  # README "drop-in RGW replacement" benchmark cycle (US-001..US-012 of
  # ralph/rgw-benchmarks). Joins the existing ceph-a cluster via the shared
  # `strata-ceph-etc` volume (ro mount of /etc/ceph + ceph.client.admin.keyring);
  # zone "default" so auto-created pools land at `default.rgw.buckets.data` and
  # do NOT collide with strata's `strata.rgw.buckets.data`. Operator-run-only
  # (NOT in CI matrix); ~120 min full sweep — see scripts/bench-rgw-comparison.sh.
  rgw:
    build:
      context: rgw-bootstrap
      dockerfile: Dockerfile
    image: strata-rgw:local
    container_name: strata-rgw
    profiles: ["bench-rgw"]
    depends_on:
      ceph:
        condition: service_healthy
    ports:
      - "9991:8080"
    volumes:
      - strata-ceph-etc:/etc/ceph:ro
      - strata-bench-creds:/etc/strata-bench
    healthcheck:
      # RGW root returns 403 (anonymous AccessDenied) not 200 — any 2xx/3xx/4xx
      # confirms the beast frontend is serving; 5xx / no response = not ready.
      test:
        - "CMD-SHELL"
        - "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/ 2>/dev/null || echo 000); [ \"$$code\" -ge 200 ] && [ \"$$code\" -lt 500 ]"
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
    restart: unless-stopped

  # Webhook receiver used by the e2e-full CI job to verify the notify worker
  # round-trip. Lives behind the `webhook-trap` profile so the default stack
  # does not pull it. Strata reaches it on the compose default network at
  # http://webhook-trap:8080/. Logs are JSON to stdout so CI can grep
  # `docker logs strata-webhook-trap` for the delivered event.
  webhook-trap:
    image: mendhak/http-https-echo:34
    container_name: strata-webhook-trap
    profiles: ["webhook-trap"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: strata-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=24h"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - strata-prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: strata-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ../grafana/datasource.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ../grafana/dashboard.yaml:/etc/grafana/provisioning/dashboards/strata.yaml:ro
      - ../grafana/strata-dashboard.json:/var/lib/grafana/dashboards/strata-dashboard.json:ro
      - strata-grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

  # OTLP collector + Jaeger live behind the "tracing" profile so the default
  # `docker compose up` does not pull them in. Enable with:
  #   docker compose --profile tracing up otel-collector jaeger
  # The gateway exports to OTLP/HTTP at otel-collector:4318; point the
  # gateway env (OTEL_EXPORTER_OTLP_ENDPOINT) at it to capture spans.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: strata-otel-collector
    profiles: ["tracing"]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ../otel/collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: strata-jaeger
    profiles: ["tracing"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"
    restart: unless-stopped

networks:
  # Pin the default bridge subnet so `make down && make up-all` cycles stay
  # on the same IP range across runs (US-005 of ralph/p1-fixes). Without the
  # pin, docker compose picks a fresh subnet each `up` and the persisted
  # ceph mon DB rejects the new IP with "Cannot assign requested address",
  # blocking cycle 2+ RGW bootstrap entirely (root cause of the
  # cycle-2 rgw-entrypoint failure that US-005 also addresses via the
  # period reconcile + pool pre-create fix). 192.168.224.0/24 picked to
  # stay clear of common Lima/Colima host bridges (192.168.5.x, 192.168.80.x).
  default:
    ipam:
      config:
        - subnet: 192.168.224.0/24

volumes:
  strata-cassandra-data:
  strata-ceph-etc:
  strata-ceph-data:
  strata-cephb-etc:
  strata-cephb-data:
  strata-pd-data:
  strata-tikv-data:
  strata-prometheus-data:
  strata-grafana-data:
  strata-jwt-shared:
  # bench-rgw creds drop (US-001 of ralph/rgw-benchmarks). Written by the rgw
  # container's entrypoint; consumed by scripts/bench-rgw-comparison.sh via
  # RGW_BENCH_CREDS_FILE pointing at this volume's mount point on the host.
  strata-bench-creds:
