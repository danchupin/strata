name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger for the gated multi-replica e2e job (US-006). The default
  # e2e-ui job runs on every PR; e2e-ui-multi-replica needs the bare-default
  # TiKV 2-replica docker stack and a 15 min budget, so it only fires on demand.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-build:
    name: Web console bundle (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false
      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install + typecheck + build
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run typecheck
          pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  lint-nginx-lab:
    name: Lint lab nginx config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: nginx -t deploy/nginx/strata-lab.conf
        run: make lint-nginx-lab

  lint-build:
    name: Build + vet
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - run: go version
      - run: go mod download
      # Single `strata` binary holds the gateway + workers + admin subcommands.
      # `go vet ./...` still covers every package transitively imported.
      - run: go build -o bin/strata ./cmd/strata
      - run: go vet ./...
      # cephimpl is a separate Go module (US-003 auth-dx-trailer-lima cycle).
      # Vet under GOWORK=off so the host doesn't need librados — vet wants to
      # compile the package; the librados-less host fails the cgo link. The
      # full ceph build runs in the docker-build job below where librados is
      # available; here we only confirm the module's go.mod still tidies.
      - run: cd internal/data/rados/cephimpl && GOWORK=off go mod tidy -diff || \
          (echo "cephimpl/ go.mod drift" && exit 1)
      # promtool lint of deploy/prometheus/alerts.yml — US-002 cycle B
      # prod-observability. Installs the Prometheus reference promtool
      # from the upstream module so the rule semantics match what the lab
      # Prometheus loads at runtime.
      - name: Install promtool
        run: go install github.com/prometheus/prometheus/cmd/promtool@latest
      - name: make promtool-check
        run: make promtool-check

  govulncheck:
    name: govulncheck (Go CVE callgraph scan)
    runs-on: ubuntu-latest
    needs: web-build
    # Parallel scanner job — sibling of lint-build / unit (US-001 cycle C
    # supply-chain-security). Matrix axis: main module + cephimpl module
    # (CLAUDE.md RADOS / cephimpl module split). Hard-fails when any
    # callgraph hit reaches code under internal/ or cmd/; WARN-only for
    # /internal/racetest, /scripts/, *_test.go (see scripts/lib/severity.sh).
    strategy:
      fail-fast: false
      matrix:
        axis: [main, cephimpl]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Install jq (fallback)
        run: command -v jq >/dev/null || sudo apt-get install -y jq
      - name: Install librados-dev (cephimpl axis only)
        if: matrix.axis == 'cephimpl'
        run: sudo apt-get update && sudo apt-get install -y librados-dev
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run gate (${{ matrix.axis }})
        env:
          GOVULNCHECK_OUTPUT_DIR: ${{ github.workspace }}/govulncheck-results
        run: |
          if [ "${{ matrix.axis }}" = "cephimpl" ]; then
            bash scripts/check-govulncheck.sh --cephimpl
          else
            bash scripts/check-govulncheck.sh
          fi
      - name: Upload findings (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-${{ matrix.axis }}
          path: govulncheck-results/
          if-no-files-found: warn
          retention-days: 14

  unit:
    name: Unit tests (-race)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - run: go test -race ./...

  integration-cassandra:
    name: Integration tests (Cassandra via testcontainers)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Pre-pull Cassandra image (warms cache)
        run: docker pull cassandra:5.0
      # `-v` prints every running test name so the regression-pinned
      # null-sentinel tests (US-006 of ralph/s3-compat-95) are visibly
      # exercised — CI grep the log for `TestCassandraNullSentinelOnDisk`
      # and the `VersioningNullSentinel` storetest case to confirm neither
      # silently went `Skip`-ed.
      - run: go test -v -tags integration -timeout 15m ./...

  docker-build:
    name: Docker build (librados linking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build gateway image
        run: docker build -f deploy/docker/Dockerfile -t strata:ceph .
      - name: Build ceph-bootstrap image
        run: docker build -f deploy/docker/ceph-bootstrap/Dockerfile -t strata-ceph:local deploy/docker/ceph-bootstrap

  e2e:
    name: End-to-end (compose + smoke)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build images
        run: |
          docker build -f deploy/docker/Dockerfile -t strata:ceph .
          docker build -f deploy/docker/ceph-bootstrap/Dockerfile -t strata-ceph:local deploy/docker/ceph-bootstrap

      - name: "Start stack (bare-default TiKV: pd + tikv + ceph + ceph-b + strata-a/b + LB)"
        run: |
          docker compose -f deploy/docker/docker-compose.yml up -d
          echo "waiting for healthy..."
          for i in $(seq 1 60); do
            pd=$(docker inspect -f '{{.State.Health.Status}}' strata-pd 2>/dev/null || echo none)
            ceph=$(docker inspect -f '{{.State.Health.Status}}' strata-ceph 2>/dev/null || echo none)
            cephb=$(docker inspect -f '{{.State.Health.Status}}' strata-cephb 2>/dev/null || echo none)
            echo "  pd=$pd ceph=$ceph cephb=$cephb"
            if [ "$pd" = "healthy" ] && [ "$ceph" = "healthy" ] && [ "$cephb" = "healthy" ]; then
              break
            fi
            sleep 5
          done
          until curl -sf -o /dev/null http://127.0.0.1:9999/readyz; do sleep 1; done

      - name: Smoke (curl)
        run: bash scripts/smoke.sh http://127.0.0.1:9999

      - name: Smoke (aws-cli, SigV4 + presigned)
        env:
          STRATA_AUTH_MODE: required
          STRATA_STATIC_CREDENTIALS: ciAK:ciSK:ci
          AWS_ACCESS_KEY_ID: ciAK
          AWS_SECRET_ACCESS_KEY: ciSK
          AWS_DEFAULT_REGION: us-east-1
        run: |
          docker compose -f deploy/docker/docker-compose.yml up -d --force-recreate strata-a strata-b
          until curl -s -o /dev/null http://127.0.0.1:9999/readyz; do sleep 1; done
          bash scripts/smoke-signed.sh http://127.0.0.1:9999

      - name: RADOS integration tests (go test -tags "ceph integration")
        run: make test-rados

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p ci-logs
          for c in strata-pd strata-tikv-storage strata-ceph strata-cephb strata-a strata-b strata-lb-nginx; do
            docker logs $c > ci-logs/$c.log 2>&1 || true
          done
          docker compose -f deploy/docker/docker-compose.yml ps > ci-logs/compose-ps.txt 2>&1 || true

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

  e2e-full:
    name: End-to-end (all workers + notify round-trip)
    runs-on: ubuntu-latest
    needs: docker-build
    env:
      # All S3-feature workers enabled alongside the gateway + gc + lifecycle.
      STRATA_WORKERS: gc,lifecycle,notify,replicator,access-log,inventory,audit-export
      STRATA_NOTIFY_TARGETS: "topic:arn:aws:sns:us-east-1:000:test=http://webhook-trap:8080/|ci-secret"
      STRATA_AUTH_MODE: required
      STRATA_STATIC_CREDENTIALS: ciAK:ciSK:ci
      AWS_ACCESS_KEY_ID: ciAK
      AWS_SECRET_ACCESS_KEY: ciSK
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build images
        run: |
          docker build -f deploy/docker/Dockerfile -t strata:ceph .
          docker build -f deploy/docker/ceph-bootstrap/Dockerfile -t strata-ceph:local deploy/docker/ceph-bootstrap

      - name: Start bare-default TiKV stack + webhook trap
        run: |
          docker compose -f deploy/docker/docker-compose.yml --profile webhook-trap up -d
          echo "waiting for healthy..."
          for i in $(seq 1 60); do
            pd=$(docker inspect -f '{{.State.Health.Status}}' strata-pd 2>/dev/null || echo none)
            ceph=$(docker inspect -f '{{.State.Health.Status}}' strata-ceph 2>/dev/null || echo none)
            cephb=$(docker inspect -f '{{.State.Health.Status}}' strata-cephb 2>/dev/null || echo none)
            echo "  pd=$pd ceph=$ceph cephb=$cephb"
            if [ "$pd" = "healthy" ] && [ "$ceph" = "healthy" ] && [ "$cephb" = "healthy" ]; then
              break
            fi
            sleep 5
          done
          until curl -sf -o /dev/null http://127.0.0.1:9999/readyz; do sleep 1; done

      - name: Verify /readyz
        run: |
          curl -fsS http://127.0.0.1:9999/readyz | tee /tmp/readyz.txt
          echo

      - name: Notification round-trip (PUT object -> webhook delivered)
        run: bash scripts/notify-roundtrip.sh http://127.0.0.1:9999

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p ci-logs
          for c in strata-pd strata-tikv-storage strata-ceph strata-cephb strata-a strata-b strata-lb-nginx strata-webhook-trap; do
            docker logs $c > ci-logs/$c.log 2>&1 || true
          done
          docker compose -f deploy/docker/docker-compose.yml ps > ci-logs/compose-ps.txt 2>&1 || true

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

  e2e-ui:
    name: End-to-end UI (Playwright)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false
      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: pnpm install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/pnpm-lock.yaml') }}
      - name: Install Playwright (chromium + deps)
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright e2e (critical-path)
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test critical-path.spec.ts
      - name: Run Playwright e2e (admin Phase 2)
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test admin.spec.ts
      - name: Run Playwright e2e (debug Phase 3)
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test debug.spec.ts
      - name: Run Playwright e2e (storage status)
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test storage.spec.ts
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-report
          path: web/playwright-report/
          if-no-files-found: warn
          retention-days: 14

  e2e-ui-multi-replica:
    name: End-to-end UI multi-replica (Playwright, gated)
    runs-on: ubuntu-latest
    # Gated: opt-in via PR title token [multi-replica] OR manual
    # workflow_dispatch run. Default PRs do NOT pay the 2-replica lab boot cost.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, '[multi-replica]'))
    timeout-minutes: 15
    needs: docker-build
    env:
      STRATA_AUTH_MODE: required
      STRATA_STATIC_CREDENTIALS: ciAK:ciSK:ci
      STRATA_WORKERS: gc,lifecycle
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false
      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Build gateway image (lab uses strata:ceph)
        run: |
          docker build -f deploy/docker/Dockerfile -t strata:ceph .
          docker build -f deploy/docker/ceph-bootstrap/Dockerfile -t strata-ceph:local deploy/docker/ceph-bootstrap
      - name: Bring up bare-default TiKV 2-replica stack
        run: make up
      - name: Wait for replicas + LB readyz
        run: make wait-strata-lab
      - name: pnpm install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/pnpm-lock.yaml') }}
      - name: Install Playwright (chromium + deps)
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright e2e (multi-replica)
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test --config=playwright.multi-replica.config.ts
      - name: Collect container logs
        if: always()
        run: |
          mkdir -p ci-logs
          for c in strata-pd strata-tikv-storage strata-a strata-b strata-lb-nginx strata-ceph strata-cephb; do
            docker logs $c > ci-logs/$c.log 2>&1 || true
          done
          docker compose -f deploy/docker/docker-compose.yml ps > ci-logs/compose-ps.txt 2>&1 || true
      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-multi-replica-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-multi-replica-report
          path: web/playwright-report/
          if-no-files-found: warn
          retention-days: 14
      - name: Tear down stack
        if: always()
        run: make down
