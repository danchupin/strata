name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger for the gated multi-replica e2e job (US-006). The default
  # e2e-ui job runs on every PR; e2e-ui-multi-replica needs the bare-default
  # TiKV 2-replica docker stack and a 15 min budget, so it only fires on demand.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-build:
    name: Web console bundle (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v6
        with:
          version: '9'
          run_install: false
      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install + typecheck + build
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run typecheck
          pnpm run build
      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  lint-nginx-lab:
    name: Lint lab nginx config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: nginx -t deploy/nginx/strata-lab.conf
        run: make lint-nginx-lab

  lint-build:
    name: Build + vet
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - run: go version
      - run: go mod download
      # Single `strata` binary holds the gateway + workers + admin subcommands.
      # `go vet ./...` still covers every package transitively imported.
      - run: go build -o bin/strata ./cmd/strata
      - run: go vet ./...
      # cephimpl is a separate Go module (US-003 auth-dx-trailer-lima cycle).
      # Vet under GOWORK=off so the host doesn't need librados — vet wants to
      # compile the package; the librados-less host fails the cgo link. The
      # full ceph build runs in the docker-build job below where librados is
      # available; here we only confirm the module's go.mod still tidies.
      - run: |
          cd internal/data/rados/cephimpl && GOWORK=off go mod tidy -diff \
            || (echo "cephimpl/ go.mod drift" && exit 1)
      # promtool lint of deploy/prometheus/alerts.yml — US-002 cycle B
      # prod-observability. Installs the Prometheus reference promtool so the
      # rule semantics match what the lab Prometheus loads at runtime.
      #
      # We pin an explicit release and fetch the official prebuilt binary
      # instead of `go install …@latest`: go 1.25 hard-rejects `go install`
      # of the prometheus module (any version) because its go.mod carries
      # replace/exclude directives — the old `@latest` step started failing
      # the build once the runner moved to go 1.25 (US-001 ci-green cycle).
      # Bounded 3-attempt retry absorbs a transient release-CDN hiccup.
      - name: Install promtool
        env:
          PROMTOOL_VERSION: "3.6.0"
        run: |
          set -euo pipefail
          url="https://github.com/prometheus/prometheus/releases/download/v${PROMTOOL_VERSION}/prometheus-${PROMTOOL_VERSION}.linux-amd64.tar.gz"
          ok=
          for attempt in 1 2 3; do
            if curl -fsSL "$url" -o /tmp/prometheus.tgz; then ok=1; break; fi
            echo "promtool download attempt ${attempt} failed; retrying in 5s" >&2
            sleep 5
          done
          [ -n "$ok" ] || { echo "promtool download failed after 3 attempts" >&2; exit 1; }
          tar -xzf /tmp/prometheus.tgz -C /tmp
          sudo install -m 0755 "/tmp/prometheus-${PROMTOOL_VERSION}.linux-amd64/promtool" /usr/local/bin/promtool
          promtool --version
      - name: make promtool-check
        run: make promtool-check

  govulncheck:
    name: govulncheck (Go CVE callgraph scan)
    runs-on: ubuntu-latest
    needs: web-build
    # Parallel scanner job — sibling of lint-build / unit (US-001 cycle C
    # supply-chain-security). Matrix axis: main module + cephimpl module
    # (CLAUDE.md RADOS / cephimpl module split). Hard-fails when any
    # callgraph hit reaches code under internal/ or cmd/; WARN-only for
    # /internal/racetest, /scripts/, *_test.go (see scripts/lib/severity.sh).
    strategy:
      fail-fast: false
      matrix:
        axis: [main, cephimpl]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - name: Install jq (fallback)
        run: command -v jq >/dev/null || sudo apt-get install -y jq
      - name: Install librados-dev (cephimpl axis only)
        if: matrix.axis == 'cephimpl'
        run: sudo apt-get update && sudo apt-get install -y librados-dev
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run gate (${{ matrix.axis }})
        env:
          GOVULNCHECK_OUTPUT_DIR: ${{ github.workspace }}/govulncheck-results
        run: |
          if [ "${{ matrix.axis }}" = "cephimpl" ]; then
            bash scripts/check-govulncheck.sh --cephimpl
          else
            bash scripts/check-govulncheck.sh
          fi
      - name: Upload findings (JSON)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: govulncheck-${{ matrix.axis }}
          path: govulncheck-results/
          if-no-files-found: warn
          retention-days: 14

  gosec:
    name: gosec (Go static-analysis scan)
    runs-on: ubuntu-latest
    needs: web-build
    # Parallel scanner job — sibling of govulncheck / lint-build / unit
    # (US-003 cycle C supply-chain-security). Scans the main Go module
    # only (cephimpl is unannotated rados glue — same vendor deps as
    # main, no incremental signal). The cephimpl exclude is LOAD-BEARING,
    # not cosmetic: go.work makes gosec's ./... file-walk descend into
    # internal/data/rados/cephimpl, whose backend.go imports go-ceph cgo
    # (needs librados, absent in the gosec container) → package load
    # failure fails the gate even at 0 findings. -exclude-dir keeps the
    # walk on the main module. Gate semantics:
    #   MEDIUM+ → hard-fail (gosec exit-code=1 on findings) + SARIF
    #             upload to GitHub Code Scanning (repo Security tab).
    #   LOW     → WARN-only second pass (gosec -no-fail), JSON artifact
    #             uploaded for operator review; never fails CI.
    # Rule + path excludes documented in .gosec.yml + applied via
    # scripts/check-gosec.sh's GOSEC_EXCLUDE_RULES / EXCLUDE_DIRS lists.
    # The composite action runs gosec inside a docker container with
    # the workspace mounted; output files land directly in the runner
    # workspace. security-events: write required for codeql-action
    # SARIF upload.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      # SHA-pinned third-party action (US-003 AC):
      #   securego/gosec v2.26.1 →
      #       4a3bd8af174872c778439083ded7adbf3747e770 (annotated tag commit)
      # Args mirror scripts/check-gosec.sh so local + CI gate semantics
      # match. Without -no-fail, the action exits 1 on any MEDIUM+
      # finding — hard-fail gate.
      - name: gosec (MEDIUM+ gate, SARIF emit)
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        with:
          args: '-severity=medium -exclude=G101,G104,G115,G304,G401,G501,G505,G703,G704,G705,G709 -exclude-dir=internal/racetest -exclude-dir=scripts -exclude-dir=internal/data/rados/cephimpl -fmt=sarif -out=gosec.sarif ./...'
      # SHA-pinned third-party action (US-003 AC):
      #   github/codeql-action v3.36.0 →
      #       03e4368ac7daa2bd82b3e85262f3bf87ee112f57 (annotated tag commit)
      - name: Upload gosec SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: 'gosec.sarif'
          category: 'gosec'
      - name: gosec (LOW WARN-only)
        if: always()
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        with:
          args: '-severity=low -exclude=G101,G104,G115,G304,G401,G501,G505,G703,G704,G705,G709 -exclude-dir=internal/racetest -exclude-dir=scripts -exclude-dir=internal/data/rados/cephimpl -no-fail -fmt=json -out=gosec-low.json ./...'
      - name: Upload gosec artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gosec-reports
          path: |
            gosec.sarif
            gosec-low.json
          if-no-files-found: warn
          retention-days: 14

  trivy-image:
    name: trivy (image CVE scan)
    runs-on: ubuntu-latest
    needs: docker-build
    # Parallel scanner job — sibling of e2e / e2e-full, both depend on
    # docker-build (US-002 cycle C supply-chain-security). Rebuilds
    # strata:ceph in-job (artifact pass via docker save | docker load
    # of a multi-GB image is slower than rebuilding under buildx cache,
    # which is what e2e / e2e-full already do). Gate semantics:
    #   CRITICAL → hard-fail (trivy-action exit-code=1) + SARIF upload
    #              to GitHub Code Scanning (repo Security tab).
    #   HIGH     → WARN-only (exit-code=0) + JSON artifact (operator
    #              review-only; not a merge gate).
    # security-events: write required for codeql-action SARIF upload.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build gateway image
        run: docker build -f deploy/docker/Dockerfile -t strata:ceph .
      # SHA-pinned third-party actions (US-002 AC):
      #   aquasecurity/trivy-action v0.36.0 →
      #       ed142fd0673e97e23eac54620cfb913e5ce36c25 (annotated tag commit)
      #   github/codeql-action v3.36.0 →
      #       03e4368ac7daa2bd82b3e85262f3bf87ee112f57 (annotated tag commit)
      - name: trivy (CRITICAL gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'strata:ceph'
          format: 'sarif'
          output: 'trivy-critical.sarif'
          severity: 'CRITICAL'
          exit-code: '1'
          trivy-config: 'trivy.yaml'
      - name: Upload CRITICAL SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: 'trivy-critical.sarif'
          category: 'trivy-critical'
      - name: trivy (HIGH WARN-only)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'strata:ceph'
          format: 'json'
          output: 'trivy-high.json'
          severity: 'HIGH'
          exit-code: '0'
          scanners: 'vuln'
          # NOTE: deliberately NOT loading trivy.yaml here — that config pins
          # severity to CRITICAL for the gate; the WARN pass needs HIGH so the
          # severity input above stays authoritative.
      - name: Upload HIGH JSON artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-high
          path: trivy-high.json
          if-no-files-found: warn
          retention-days: 14

  license-audit:
    name: license-audit (go-licenses forbidden/restricted gate)
    runs-on: ubuntu-latest
    needs: web-build
    # Parallel scanner job — sibling of govulncheck / gosec / lint-build
    # (US-009 cycle C supply-chain-security). Matrix axis: main module +
    # cephimpl module (CLAUDE.md RADOS / cephimpl module split). Hard-fails
    # when any dependency carries a forbidden (GPL/AGPL) or restricted
    # (LGPL strong-copyleft) license, or an UNKNOWN license not allowlisted
    # in .licensei.yml. Wraps scripts/check-license.sh.
    strategy:
      fail-fast: false
      matrix:
        axis: [main, cephimpl]
    steps:
      - uses: actions/checkout@v7
      # setup-go with go-version '1.25' resolves to the latest 1.25.x
      # patch (>=1.25.11 — bumped to pick up the GO-2026-5037/5039 stdlib
      # fix). go-licenses v1.6.0 MUST be built with that toolchain — built
      # against go1.25.1 it mis-reports stdlib packages as "Non go modules
      # projects" (upstream issue #128). The repo's go.mod `go 1.25.11`
      # directive + GOTOOLCHAIN=auto guarantee the `go install` below picks
      # the working toolchain.
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - name: Install librados-dev (cephimpl axis only)
        if: matrix.axis == 'cephimpl'
        run: sudo apt-get update && sudo apt-get install -y librados-dev
      # SHA-pinned third-party tool (US-009 AC):
      #   github.com/google/go-licenses v1.6.0 →
      #       5348b744d0983d85713295ea08a20cca1654a45e (release tag commit)
      # NOTE: pinned to v1.6.0 NOT the latest v2.0.1 release — go-licenses
      # v2.0.x cannot load stdlib package module info on this codebase
      # ("Non go modules projects are no longer supported", upstream
      # issue #128) and fails every scan. v1.6.0 is the latest WORKING
      # stable. Revisit when v2 fixes #128.
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@5348b744d0983d85713295ea08a20cca1654a45e
      - name: Run gate (${{ matrix.axis }})
        env:
          GOLICENSES_OUTPUT_DIR: ${{ github.workspace }}/license-results
        run: |
          if [ "${{ matrix.axis }}" = "cephimpl" ]; then
            bash scripts/check-license.sh --cephimpl
          else
            bash scripts/check-license.sh
          fi
      - name: Upload license report (CSV)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: license-report-${{ matrix.axis }}
          path: license-results/
          if-no-files-found: warn
          retention-days: 14

  unit:
    name: Unit tests (-race)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - run: go test -race ./...

  coverage:
    name: Coverage baseline (QA readiness)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      # Default tag (TiKV + memory, no ceph/librados). On Linux every package
      # builds, so this run measures the full per-package table — the source of
      # truth (FR-4) for the rows the local macOS run records as
      # "CI (local env-blocked)".
      - name: make test-cover
        run: make test-cover
      - name: Show measured table
        run: CHECK=1 bash scripts/qa/coverage.sh
      # US-013: ratchet gate. FAILS the job if any core package regresses below
      # its US-001 baseline floor (scripts/qa/coverage-floors.txt). On Linux CI
      # every core package builds, so internal/s3api + internal/meta/tikv are
      # measured here (locally they are cgo-blocked). This is the new required
      # check context — see the branch-protection apply command in
      # tasks/qa-readiness-report.md §6.
      - name: Coverage ratchet gate
        run: make coverage-gate
      - name: Upload regenerated report
        uses: actions/upload-artifact@v7
        with:
          name: qa-readiness-report
          path: tasks/qa-readiness-report.md

  integration:
    name: Integration tests (TiKV + backends)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      # TiKV is the canonical default backend (the lab default + the e2e stack
      # both run TiKV). The Cassandra `meta.Store` impl stays first-class in
      # code, but its heavy integration tests (LWT/Paxos contract round-trips)
      # hang for the full gocql timeout on the resource-constrained GitHub
      # runner — Cassandra is JVM-heavy and these Paxos ops starve where TiKV
      # does not (they pass in ~17s locally). Gate the Cassandra integration
      # package OFF the per-PR CI for now; the storetest contract still runs
      # against TiKV + memory, so the backend-agnostic surface stays covered.
      # Run the Cassandra integration tests locally / in a future gated job
      # (`go test -tags integration ./internal/meta/cassandra/...`).
      # -p 1 still serialises the remaining package binaries (tikv / minio /
      # localstack) so their testcontainers don't spin all at once and contend.
      - name: Integration tests (TiKV default; Cassandra package gated off)
        run: |
          pkgs=$(go list ./... | grep -v '/internal/meta/cassandra')
          go test -v -tags integration -timeout 30m -p 1 $pkgs

  docker-build:
    name: Docker build (librados linking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Plain docker build (gha-cache reverted): measured net SLOWER for the
      # multi-GB ceph base — cache-to mode=max re-exports the huge layers to
      # the Actions cache (the base is pulled from quay regardless), costing
      # more than the rebuild. docker-build dropped from 140-325s (cached,
      # high variance) back to a tighter 150-180s without it.
      - name: Build gateway image
        run: docker build -f deploy/docker/Dockerfile -t strata:ceph .
      - name: Build ceph-bootstrap image
        run: docker build -f deploy/docker/ceph-bootstrap/Dockerfile -t strata-ceph:local deploy/docker/ceph-bootstrap

  e2e:
    name: End-to-end (compose + smoke)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build images
        run: |
          docker build -f deploy/docker/Dockerfile -t strata:ceph .
          docker build -f deploy/docker/ceph-bootstrap/Dockerfile -t strata-ceph:local deploy/docker/ceph-bootstrap

      - name: "Start stack (bare-default TiKV: pd + tikv + ceph + ceph-b + strata-a/b + LB)"
        run: |
          docker compose -f deploy/docker/docker-compose.yml up -d
          echo "waiting for healthy..."
          for i in $(seq 1 60); do
            pd=$(docker inspect -f '{{.State.Health.Status}}' strata-pd 2>/dev/null || echo none)
            ceph=$(docker inspect -f '{{.State.Health.Status}}' strata-ceph 2>/dev/null || echo none)
            cephb=$(docker inspect -f '{{.State.Health.Status}}' strata-cephb 2>/dev/null || echo none)
            echo "  pd=$pd ceph=$ceph cephb=$cephb"
            if [ "$pd" = "healthy" ] && [ "$ceph" = "healthy" ] && [ "$cephb" = "healthy" ]; then
              break
            fi
            sleep 5
          done
          until curl -sf -o /dev/null http://127.0.0.1:9999/readyz; do sleep 1; done

      - name: Smoke (curl)
        run: bash scripts/smoke.sh http://127.0.0.1:9999

      - name: Smoke (aws-cli, SigV4 + presigned)
        env:
          STRATA_AUTH_MODE: required
          STRATA_STATIC_CREDENTIALS: ciAK:ciSK:ci
          AWS_ACCESS_KEY_ID: ciAK
          AWS_SECRET_ACCESS_KEY: ciSK
          AWS_DEFAULT_REGION: us-east-1
        run: |
          docker compose -f deploy/docker/docker-compose.yml up -d --force-recreate strata-a strata-b
          # -sf (NOT -s): without -f, curl exits 0 on a 502/503, so the loop
          # broke out the instant the LB answered "no live upstreams" while the
          # just-recreated strata-a/b were still restarting -> smoke-signed's
          # first GET hit 502 instead of the expected 403. -f makes the wait
          # loop until a real HTTP 200 from a live replica.
          until curl -sf -o /dev/null http://127.0.0.1:9999/readyz; do sleep 1; done
          bash scripts/smoke-signed.sh http://127.0.0.1:9999

      - name: RADOS integration tests (go test -tags "ceph integration")
        run: make test-rados

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p ci-logs
          for c in strata-pd strata-tikv-storage strata-ceph strata-cephb strata-a strata-b strata-lb-nginx; do
            docker logs $c > ci-logs/$c.log 2>&1 || true
          done
          docker compose -f deploy/docker/docker-compose.yml ps > ci-logs/compose-ps.txt 2>&1 || true

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

  e2e-full:
    name: End-to-end (all workers + notify round-trip)
    runs-on: ubuntu-latest
    needs: docker-build
    env:
      # All S3-feature workers enabled alongside the gateway + gc + lifecycle.
      STRATA_WORKERS: gc,lifecycle,notify,replicator,access-log,inventory,audit-export
      STRATA_NOTIFY_TARGETS: "topic:arn:aws:sns:us-east-1:000:test=http://webhook-trap:8080/|ci-secret"
      STRATA_AUTH_MODE: required
      STRATA_STATIC_CREDENTIALS: ciAK:ciSK:ci
      AWS_ACCESS_KEY_ID: ciAK
      AWS_SECRET_ACCESS_KEY: ciSK
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build images
        run: |
          docker build -f deploy/docker/Dockerfile -t strata:ceph .
          docker build -f deploy/docker/ceph-bootstrap/Dockerfile -t strata-ceph:local deploy/docker/ceph-bootstrap

      - name: Start bare-default TiKV stack + webhook trap
        run: |
          docker compose -f deploy/docker/docker-compose.yml --profile webhook-trap up -d
          echo "waiting for healthy..."
          for i in $(seq 1 60); do
            pd=$(docker inspect -f '{{.State.Health.Status}}' strata-pd 2>/dev/null || echo none)
            ceph=$(docker inspect -f '{{.State.Health.Status}}' strata-ceph 2>/dev/null || echo none)
            cephb=$(docker inspect -f '{{.State.Health.Status}}' strata-cephb 2>/dev/null || echo none)
            echo "  pd=$pd ceph=$ceph cephb=$cephb"
            if [ "$pd" = "healthy" ] && [ "$ceph" = "healthy" ] && [ "$cephb" = "healthy" ]; then
              break
            fi
            sleep 5
          done
          until curl -sf -o /dev/null http://127.0.0.1:9999/readyz; do sleep 1; done

      - name: Verify /readyz
        run: |
          curl -fsS http://127.0.0.1:9999/readyz | tee /tmp/readyz.txt
          echo

      - name: Notification round-trip (PUT object -> webhook delivered)
        run: bash scripts/notify-roundtrip.sh http://127.0.0.1:9999

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p ci-logs
          for c in strata-pd strata-tikv-storage strata-ceph strata-cephb strata-a strata-b strata-lb-nginx strata-webhook-trap; do
            docker logs $c > ci-logs/$c.log 2>&1 || true
          done
          docker compose -f deploy/docker/docker-compose.yml ps > ci-logs/compose-ps.txt 2>&1 || true

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-full-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

  e2e-ui:
    name: End-to-end UI (Playwright)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v6
        with:
          version: '9'
          run_install: false
      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Download web bundle
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - name: pnpm install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/pnpm-lock.yaml') }}
      - name: Install Playwright (chromium + deps)
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright e2e (critical-path)
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test critical-path.spec.ts
      - name: Run Playwright e2e (admin Phase 2)
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test admin.spec.ts
      - name: Run Playwright e2e (debug Phase 3)
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test debug.spec.ts
      - name: Run Playwright e2e (storage status)
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test storage.spec.ts
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-ui-report
          path: web/playwright-report/
          if-no-files-found: warn
          retention-days: 14

  e2e-ui-multi-replica:
    name: End-to-end UI multi-replica (Playwright, gated)
    runs-on: ubuntu-latest
    # Gated: opt-in via PR title token [multi-replica] OR manual
    # workflow_dispatch run. Default PRs do NOT pay the 2-replica lab boot cost.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, '[multi-replica]'))
    timeout-minutes: 15
    needs: docker-build
    env:
      STRATA_AUTH_MODE: required
      STRATA_STATIC_CREDENTIALS: ciAK:ciSK:ci
      STRATA_WORKERS: gc,lifecycle
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v6
        with:
          version: '9'
          run_install: false
      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Build gateway image (lab uses strata:ceph)
        run: |
          docker build -f deploy/docker/Dockerfile -t strata:ceph .
          docker build -f deploy/docker/ceph-bootstrap/Dockerfile -t strata-ceph:local deploy/docker/ceph-bootstrap
      - name: Bring up bare-default TiKV 2-replica stack
        run: make up
      - name: Wait for replicas + LB readyz
        run: make wait-strata-lab
      - name: pnpm install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/pnpm-lock.yaml') }}
      - name: Install Playwright (chromium + deps)
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright e2e (multi-replica)
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test --config=playwright.multi-replica.config.ts
      - name: Collect container logs
        if: always()
        run: |
          mkdir -p ci-logs
          for c in strata-pd strata-tikv-storage strata-a strata-b strata-lb-nginx strata-ceph strata-cephb; do
            docker logs $c > ci-logs/$c.log 2>&1 || true
          done
          docker compose -f deploy/docker/docker-compose.yml ps > ci-logs/compose-ps.txt 2>&1 || true
      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-ui-multi-replica-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-ui-multi-replica-report
          path: web/playwright-report/
          if-no-files-found: warn
          retention-days: 14
      - name: Tear down stack
        if: always()
        run: make down
