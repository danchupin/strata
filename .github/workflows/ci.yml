name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web-build:
    name: Web console bundle (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false
      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install + typecheck + build
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run typecheck
          pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  lint-build:
    name: Build + vet
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - run: go version
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...

  unit:
    name: Unit tests (-race)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - run: go test -race ./...

  integration-cassandra:
    name: Integration tests (Cassandra via testcontainers)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Pre-pull Cassandra image (warms cache)
        run: docker pull cassandra:5.0
      - run: go test -tags integration -timeout 15m ./...

  docker-build:
    name: Docker build (librados linking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build gateway image
        run: docker build -f deploy/docker/Dockerfile -t strata:ceph .
      - name: Build ceph-bootstrap image
        run: docker build -f deploy/docker/ceph-bootstrap/Dockerfile -t strata-ceph:local deploy/docker/ceph-bootstrap

  e2e:
    name: End-to-end (compose + smoke)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build images
        run: |
          docker build -f deploy/docker/Dockerfile -t strata:ceph .
          docker build -f deploy/docker/ceph-bootstrap/Dockerfile -t strata-ceph:local deploy/docker/ceph-bootstrap

      - name: Start stack
        run: |
          docker compose -f deploy/docker/docker-compose.yml up -d cassandra ceph
          echo "waiting for healthy..."
          for i in $(seq 1 60); do
            cass=$(docker inspect -f '{{.State.Health.Status}}' strata-cassandra 2>/dev/null || echo none)
            ceph=$(docker inspect -f '{{.State.Health.Status}}' strata-ceph 2>/dev/null || echo none)
            echo "  cass=$cass ceph=$ceph"
            if [ "$cass" = "healthy" ] && [ "$ceph" = "healthy" ]; then
              break
            fi
            sleep 5
          done

      - name: Launch gateway + workers
        run: |
          docker compose -f deploy/docker/docker-compose.yml up -d gateway lifecycle gc
          until curl -sf -o /dev/null http://127.0.0.1:9999/; do sleep 1; done

      - name: Smoke (curl)
        run: bash scripts/smoke.sh http://127.0.0.1:9999

      - name: Smoke (aws-cli, SigV4 + presigned)
        env:
          STRATA_AUTH_MODE: required
          STRATA_STATIC_CREDENTIALS: ciAK:ciSK:ci
          AWS_ACCESS_KEY_ID: ciAK
          AWS_SECRET_ACCESS_KEY: ciSK
          AWS_DEFAULT_REGION: us-east-1
        run: |
          docker compose -f deploy/docker/docker-compose.yml up -d --force-recreate gateway
          until curl -s -o /dev/null http://127.0.0.1:9999/; do sleep 1; done
          bash scripts/smoke-signed.sh http://127.0.0.1:9999

      - name: RADOS integration tests (go test -tags "ceph integration")
        run: make test-rados

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p ci-logs
          for c in strata-cassandra strata-ceph strata-gateway strata-lifecycle strata-gc; do
            docker logs $c > ci-logs/$c.log 2>&1 || true
          done
          docker compose -f deploy/docker/docker-compose.yml ps > ci-logs/compose-ps.txt 2>&1 || true

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

  e2e-ui:
    name: End-to-end UI (Playwright)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false
      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: pnpm install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/pnpm-lock.yaml') }}
      - name: Install Playwright (chromium + deps)
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright e2e
        working-directory: web
        env:
          CI: 'true'
        run: pnpm exec playwright test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-report
          path: web/playwright-report/
          if-no-files-found: warn
          retention-days: 14
