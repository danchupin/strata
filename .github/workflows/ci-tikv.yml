name: CI (TiKV)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  integration-tikv:
    name: Integration tests (TiKV via testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Pre-pull PD + TiKV images (warms cache)
        run: |
          docker pull pingcap/pd:v8.5.0
          docker pull pingcap/tikv:v8.5.0
      - name: Run storetest contract against TiKV
        run: go test -tags integration -timeout 15m ./internal/meta/tikv/...

  # e2e-tikv retired in ralph/tikv-default-lab cycle: the bare-default compose
  # is now TiKV-backed (strata-a/b behind nginx LB on :9999), so the main CI
  # `e2e` job in ci.yml already exercises the TiKV path via `make smoke`.
