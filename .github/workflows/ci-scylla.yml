name: CI (ScyllaDB)

on:
  workflow_dispatch:
  schedule:
    # Weekly: Monday 04:00 UTC.
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  integration-scylla:
    name: Integration tests (ScyllaDB via testcontainers)
    runs-on: ubuntu-latest
    env:
      STRATA_SCYLLA_TEST: '1'
      STRATA_SCYLLA_IMAGE: 'scylladb/scylla:5.4'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Pre-pull ScyllaDB image (warms cache)
        run: docker pull "$STRATA_SCYLLA_IMAGE"
      - name: Run storetest contract against ScyllaDB
        run: go test -tags integration -timeout 20m -run TestScyllaStoreContract ./internal/meta/cassandra/...
