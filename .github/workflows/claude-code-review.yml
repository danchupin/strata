name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write (was read): the review action needs it to POST inline review
      # comments back to the PR. With read-only it ran green every PR (burning
      # the CLAUDE_CODE_OAUTH_TOKEN quota) but silently posted nothing.
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # Pinned to the newest stable patch (v1.0.133, 2026-05-23). The floating
        # @v1 tag still points at the Aug-2025 GA bundle, whose bun bootstrap
        # crashes with "directory mismatch ... tsconfig.json, fd 4" before the
        # prompt runs. Bump deliberately when a newer stable patch lands.
        uses: anthropics/claude-code-action@v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # Two complementary passes, posted as ONE review:
          #  1. the generic code-review plugin (broad correctness/reuse/efficiency),
          #  2. our repo-local /review-strata skill, which orchestrates the
          #     .claude/agents domain reviewers for this codebase's specific failure
          #     modes (LWT/CAS coherence, drain stop-write, GC dual-write,
          #     sentinel<->APIError, S3 parity). The skill + agents ship in the
          #     checked-out repo's .claude/, so the action discovers them.
          prompt: |
            Review pull request ${{ github.repository }}/pull/${{ github.event.pull_request.number }} with TWO complementary passes, then post the combined result as ONE PR review.

            1. General pass — run the /code-review:code-review skill for ${{ github.repository }}/pull/${{ github.event.pull_request.number }} (broad correctness, reuse, efficiency).
            2. Strata-domain pass — invoke the /review-strata skill on the same PR. It is repo-local (.claude/skills/review-strata) and fans out the .claude/agents reviewers (correctness, tests, s3-compat, errors) for failure modes the generic pass does not specialize in: LWT/CAS read-after-write coherence, the drain stop-write invariant, GC dual-write lockstep, the sentinel<->APIError mapping, and S3/AWS parity.

            Merge both passes into a single review: dedupe overlapping findings, severity-gate to blocking/suggestion (suppress nits), and label each finding's source. Strata is pre-launch — do NOT raise backwards-compat, rolling-upgrade, or migration-backfill concerns.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

