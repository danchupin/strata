openapi: 3.1.0
info:
  title: Strata Admin API
  version: "1.0.0"
  description: |
    JSON HTTP contract between the embedded Strata operator console and the
    gateway. Phase 1 (US-003 .. US-012) defines the read-only surface; Phase 2
    introduces write actions under a separate /admin/v1/* extension. Versioned
    via the path prefix — breaking changes ship under /admin/v2/*.
  contact:
    name: Strata
servers:
  - url: /admin/v1
    description: Versioned admin namespace on the gateway port

components:
  securitySchemes:
    sigv4:
      type: apiKey
      in: header
      name: Authorization
      description: AWS SigV4 (`AWS4-HMAC-SHA256 Credential=...`).
    sessionCookie:
      type: apiKey
      in: cookie
      name: strata_session
      description: |
        24h JWT issued by `POST /admin/v1/auth/login` (US-004). HS256 signed
        with the per-deployment `STRATA_CONSOLE_JWT_SECRET`.
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    ClusterStatus:
      type: object
      required: [status, version, started_at, uptime_sec, cluster_name, node_count, node_count_healthy, meta_backend, data_backend]
      properties:
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        version: { type: string, description: "Git SHA + tag of the running build" }
        started_at: { type: integer, format: int64, description: "Unix epoch (seconds)" }
        uptime_sec: { type: integer, format: int64 }
        cluster_name: { type: string }
        node_count: { type: integer }
        node_count_healthy: { type: integer }
        meta_backend: { type: string, enum: [cassandra, memory] }
        data_backend: { type: string, enum: [rados, memory] }

    ClusterNode:
      type: object
      required: [id, address, version, started_at, uptime_sec, status, workers, leader_for, last_heartbeat]
      properties:
        id: { type: string }
        address: { type: string }
        version: { type: string }
        started_at: { type: integer, format: int64 }
        uptime_sec: { type: integer, format: int64 }
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        workers: { type: array, items: { type: string } }
        leader_for: { type: array, items: { type: string } }
        last_heartbeat: { type: integer, format: int64 }

    ClusterNodes:
      type: object
      required: [nodes]
      properties:
        nodes:
          type: array
          items: { $ref: '#/components/schemas/ClusterNode' }

    BucketSummary:
      type: object
      required: [name, owner]
      properties:
        name: { type: string }
        owner: { type: string }
        region: { type: string }
        created_at: { type: integer, format: int64 }
        size_bytes: { type: integer, format: int64 }
        object_count: { type: integer, format: int64 }

    BucketsList:
      type: object
      required: [buckets, total]
      properties:
        buckets:
          type: array
          items: { $ref: '#/components/schemas/BucketSummary' }
        total: { type: integer }

    BucketDetail:
      type: object
      required: [name, owner, region, created_at, versioning, object_lock, size_bytes, object_count]
      properties:
        name: { type: string }
        owner: { type: string }
        region: { type: string }
        created_at: { type: integer, format: int64 }
        versioning:
          type: string
          enum: [Enabled, Suspended, Off]
          description: |
            Operator-facing label. Maps the meta-store enum
            (Disabled|Enabled|Suspended) to (Off|Enabled|Suspended).
        object_lock:
          type: boolean
          description: |
            True when bucket-level object lock is on. Phase 1 always
            reports false — bucket object-lock state is not persisted on
            meta.Bucket today; Phase 2 lifts this.
        size_bytes: { type: integer, format: int64 }
        object_count: { type: integer, format: int64 }
        backend_presign: { type: boolean }
        shard_count:
          type: integer
          description: |
            Active sharding factor for the bucket's `objects` table partition
            (hash(key)%N). Surfaced for the Hot Shards drill panel which
            reconstructs shard from key client-side via FNV-1a.
        replication_configured:
          type: boolean
          description: |
            True when the bucket has a non-empty replication configuration.
            The UI uses this flag to gate the per-bucket Replication tab
            (US-014); only buckets with a configuration get the tab.

    BucketShardStat:
      type: object
      required: [shard, bytes, objects]
      properties:
        shard: { type: integer, description: "Shard ID (0..N-1)." }
        bytes: { type: integer, format: int64 }
        objects: { type: integer, format: int64 }

    BucketDistributionResponse:
      type: object
      required: [shards]
      properties:
        shards:
          type: array
          items: { $ref: '#/components/schemas/BucketShardStat' }
          description: |
            One row per shard ID 0..N-1, contiguous and zero-filled when a
            shard has no live objects. Same data the bucketstats sampler
            emits via `strata_bucket_shard_{bytes,objects}` gauges.

    BucketReplicationLagPoint:
      type: object
      required: [ts, value]
      properties:
        ts: { type: string, format: date-time }
        value: { type: number, format: float }

    BucketReplicationLagResponse:
      type: object
      properties:
        empty:
          type: boolean
          description: True when the bucket has no replication configuration.
        reason:
          type: string
          description: Human-readable explanation when `empty=true`.
        values:
          type: array
          items: { $ref: '#/components/schemas/BucketReplicationLagPoint' }

    BucketTop:
      type: object
      required: [name]
      properties:
        name: { type: string }
        size_bytes: { type: integer, format: int64 }
        object_count: { type: integer, format: int64 }
        request_count_24h: { type: integer, format: int64 }

    BucketsTop:
      type: object
      required: [buckets, metrics_available]
      properties:
        buckets:
          type: array
          items: { $ref: '#/components/schemas/BucketTop' }
        metrics_available:
          type: boolean
          description: |
            False when STRATA_PROMETHEUS_URL is unset or the upstream PromQL
            query failed. The UI then renders '—' in the request column and
            a "Metrics unavailable" warning under the card title.

    ObjectSummary:
      type: object
      required: [key]
      properties:
        key: { type: string }
        size: { type: integer, format: int64 }
        last_modified: { type: integer, format: int64 }
        etag: { type: string }
        storage_class: { type: string }

    ObjectsList:
      type: object
      required: [objects, common_prefixes, is_truncated]
      properties:
        objects:
          type: array
          items: { $ref: '#/components/schemas/ObjectSummary' }
        common_prefixes:
          type: array
          items: { type: string }
        next_marker: { type: string }
        is_truncated: { type: boolean }

    ConsumerTop:
      type: object
      required: [access_key]
      properties:
        access_key: { type: string }
        user: { type: string }
        request_count_24h: { type: integer, format: int64 }
        bytes_24h: { type: integer, format: int64 }

    ConsumersTop:
      type: object
      required: [consumers, metrics_available]
      properties:
        consumers:
          type: array
          items: { $ref: '#/components/schemas/ConsumerTop' }
        metrics_available:
          type: boolean
          description: |
            False when STRATA_PROMETHEUS_URL is unset or the upstream PromQL
            query failed. The UI then renders the "Metrics unavailable"
            warning instead of empty rows.

    MetricPoint:
      type: array
      minItems: 2
      maxItems: 2
      items: { type: number }
      description: "[epoch_ms, value]"

    MetricSeries:
      type: object
      required: [name, points]
      properties:
        name: { type: string }
        points:
          type: array
          items: { $ref: '#/components/schemas/MetricPoint' }

    MetricsTimeseries:
      type: object
      required: [series, metrics_available]
      properties:
        series:
          type: array
          items: { $ref: '#/components/schemas/MetricSeries' }
        metrics_available:
          type: boolean
          description: |
            False when STRATA_PROMETHEUS_URL is unset or the upstream PromQL
            query failed. The UI then renders a "Metrics unavailable —
            set STRATA_PROMETHEUS_URL" inline message instead of empty
            charts.

    BucketQuota:
      type: object
      required: [max_bytes, max_objects, max_bytes_per_object]
      description: |
        Per-bucket quota (US-009). Zero on any field means "unlimited" — matches
        the AWS / RGW semantics of an unset field. Enforced at PUT-validate time
        (US-006); a violation returns HTTP 403 with S3 code `QuotaExceeded`.
      properties:
        max_bytes: { type: integer, format: int64, minimum: 0 }
        max_objects: { type: integer, format: int64, minimum: 0 }
        max_bytes_per_object: { type: integer, format: int64, minimum: 0 }

    ClusterStateEntry:
      type: object
      required: [id, state, mode, weight]
      description: |
        One row in the GET /clusters response (US-006 placement-rebalance;
        `mode` added US-001 drain-transparency; `weight` + `pending`
        state added US-001 cluster-weights). `state` is one of
        "pending" / "live" / "draining_readonly" / "evacuating" /
        "removed"; `mode` is "readonly" for draining_readonly,
        "evacuate" for evacuating, "" otherwise. `weight` is the
        per-cluster default-routing share (0..100); reported as 0 for
        every state except live. `backend` is "rados" or "s3" (when
        known).
      properties:
        id: { type: string }
        state:
          type: string
          enum: [pending, live, draining_readonly, evacuating, removed]
        mode:
          type: string
          enum: ["", readonly, evacuate]
        weight:
          type: integer
          minimum: 0
          maximum: 100
        backend: { type: string }

    DrainRequest:
      type: object
      required: [mode]
      description: |
        Request body for POST /clusters/{id}/drain (US-001 drain-transparency).
        `mode` is required (no default): "readonly" stops writes only —
        reads, deletes, in-flight multipart continue, no migration;
        "evacuate" stops writes AND starts the rebalance worker migrating
        chunks off the cluster.
      properties:
        mode:
          type: string
          enum: [readonly, evacuate]

    InvalidTransitionError:
      type: object
      required: [code, message, current_state, requested_mode]
      description: |
        409 Conflict body when a drain request asks for a transition the
        4-state machine refuses (US-001 drain-transparency).
      properties:
        code:
          type: string
          enum: [InvalidTransition]
        message: { type: string }
        current_state:
          type: string
          enum: [live, draining_readonly, evacuating, removed]
        requested_mode:
          type: string
          enum: ["", readonly, evacuate]

    ClustersList:
      type: object
      required: [clusters]
      properties:
        clusters:
          type: array
          items: { $ref: '#/components/schemas/ClusterStateEntry' }

    ClusterDrainProgress:
      type: object
      required: [state, mode, weight]
      description: |
        Per-draining-cluster progress snapshot returned by
        GET /clusters/{id}/drain-progress (US-003 drain-lifecycle;
        `mode` added US-001 drain-transparency; categorized counters
        added US-002 drain-transparency). The three category counters
        replace the flat chunks_on_cluster as the source of truth —
        chunks_on_cluster is kept as their sum for dashboard
        compatibility. ETA is computed against migratable_chunks
        only (stuck chunks need an operator policy edit, not
        migration throughput). State=draining_readonly returns
        state/mode + a "stop-writes mode" warning with all numeric
        fields null — there is no migration scan in stop-writes mode.
      properties:
        state:
          type: string
          enum: [pending, live, draining_readonly, evacuating, removed]
        mode:
          type: string
          enum: ["", readonly, evacuate]
        weight:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Per-cluster default-routing weight (0..100). Mirrors the
            stored value verbatim (no live-state masking, unlike the
            /clusters list endpoint) so operators can see what was set
            even on a draining cluster (US-001 cluster-weights).
        chunks_on_cluster:
          type: integer
          format: int64
          nullable: true
          description: Sum of the three category counters.
        migratable_chunks:
          type: integer
          format: int64
          nullable: true
          description: |
            Chunks the rebalance worker can move under the bucket's
            current Placement policy (at least one live cluster left).
        stuck_single_policy_chunks:
          type: integer
          format: int64
          nullable: true
          description: |
            Chunks whose bucket has a Placement policy but every cluster
            referenced by that policy is draining → the picker has
            nothing to pick. Resolved by editing the bucket's
            Placement to include a live cluster.
        stuck_no_policy_chunks:
          type: integer
          format: int64
          nullable: true
          description: |
            Chunks routed to the cluster via class-env routing on a
            bucket without a Placement policy. Resolved by setting an
            initial Placement that excludes the draining cluster.
        bytes_on_cluster:
          type: integer
          format: int64
          nullable: true
        base_chunks_at_start:
          type: integer
          format: int64
          nullable: true
          description: |
            Total chunk count captured on the first committed scan after
            the live → evacuating transition. UI percent-filled =
            1 - chunks_on_cluster / base_chunks_at_start when set.
        last_scan_at:
          type: string
          format: date-time
          nullable: true
        eta_seconds:
          type: integer
          format: int64
          nullable: true
          description: |
            migratable_chunks / rate(strata_rebalance_chunks_moved_total
            {from="<id>"}[5m]). Null when Prom is unset/unavailable,
            migratable_chunks is 0, or the move rate is zero. Stuck
            categories are excluded from the ETA — they never converge
            without operator action.
        deregister_ready:
          type: boolean
          nullable: true
          description: |
            True when state=evacuating AND ALL three safety conditions
            hold: chunks_on_cluster=0, gc_queue_pending_for_cluster=0,
            no_open_multipart_on_cluster=true. Any unmet condition is
            surfaced via not_ready_reasons. When true, the cluster row
            can be removed from STRATA_RADOS_CLUSTERS / STRATA_S3_CLUSTERS
            and the gateways rolling-restarted.
        not_ready_reasons:
          type: array
          description: |
            Tokens describing each unmet condition keeping
            deregister_ready=false (US-006 drain-cleanup). Empty / omitted
            when deregister_ready is true. Tokens:
              - chunks_remaining: manifest scan still reports chunks on the cluster.
              - gc_queue_pending: GC worker has pending chunk-deletion rows for the cluster.
              - open_multipart: at least one in-flight multipart upload is bound to the cluster.
          items:
            type: string
            enum: [chunks_remaining, gc_queue_pending, open_multipart]
        by_bucket:
          type: array
          description: |
            Per-bucket breakdown of the chunks-on-cluster total straight
            off the last committed scan (US-006 drain-transparency).
            Sorted stuck_single_policy → stuck_no_policy → migratable,
            then descending by chunk_count, then ascending by name.
            Empty/omitted when the scan committed no draining-cluster
            chunks for any bucket.
          items: { $ref: '#/components/schemas/BucketDrainProgressEntry' }
        warnings:
          type: array
          items: { type: string }
          description: |
            Free-form operator-facing notes (e.g. "progress data
            stale" when last_scan_at older than 2× rebalance interval;
            "stop-writes mode — migration scan skipped" for
            state=draining_readonly).

    BucketDrainProgressEntry:
      type: object
      required: [name, category, chunk_count, bytes_used]
      description: |
        One bucket's contribution to a draining cluster's progress
        snapshot (US-006 drain-transparency). Category matches the
        rebalance worker's classifier.
      properties:
        name: { type: string }
        category:
          type: string
          enum: [migratable, stuck_single_policy, stuck_no_policy]
        chunk_count: { type: integer, format: int64 }
        bytes_used: { type: integer, format: int64 }

    BucketReferenceEntry:
      type: object
      required: [name, weight, chunk_count, bytes_used]
      description: |
        One row in the cluster-bucket-references list (US-006 drain-lifecycle).
        `weight` echoes the bucket's Placement[clusterID]; `chunk_count` and
        `bytes_used` come from the live bucket_stats counter row (no manifest
        walk per request — the rebalance worker covers the actual-distribution
        side).
      properties:
        name: { type: string }
        weight: { type: integer, minimum: 1, maximum: 100 }
        chunk_count: { type: integer, format: int64 }
        bytes_used: { type: integer, format: int64 }

    SuggestedPolicy:
      type: object
      required: [label, policy]
      description: |
        One operator-facing remediation offered per bucket in the
        /drain-impact response (US-003 drain-transparency). `label` is the
        human-readable description the BulkPlacementFixDialog (US-005)
        renders in its per-bucket dropdown; `policy` is the
        {clusterID: weight} body the operator would PUT to
        /admin/v1/buckets/{name}/placement.
      properties:
        label: { type: string }
        policy:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
            maximum: 100

    BucketImpactEntry:
      type: object
      required: [name, category, chunk_count, bytes_used, suggested_policies]
      description: |
        One row in the by_bucket section of the /drain-impact response
        (US-003 drain-transparency). `current_policy` is null when the
        bucket has no Placement; the suggested_policies switch to "Set
        initial policy" labels in that case. `category` is one of
        migratable / stuck_single_policy / stuck_no_policy and matches
        the per-bucket verdict the rebalance worker emits via the same
        rebalance.ClassifyBucket helper.
      properties:
        name: { type: string }
        current_policy:
          type: object
          nullable: true
          additionalProperties:
            type: integer
            minimum: 0
            maximum: 100
        category:
          type: string
          enum: [migratable, stuck_single_policy, stuck_no_policy]
        chunk_count: { type: integer, format: int64 }
        bytes_used: { type: integer, format: int64 }
        suggested_policies:
          type: array
          items: { $ref: '#/components/schemas/SuggestedPolicy' }

    ClusterDrainImpact:
      type: object
      required:
        - cluster_id
        - current_state
        - migratable_chunks
        - stuck_single_policy_chunks
        - stuck_no_policy_chunks
        - total_chunks
        - by_bucket
        - total_buckets
        - last_scan_at
      description: |
        Wire shape returned by GET /clusters/{id}/drain-impact (US-003
        drain-transparency). Categorized chunk counters mirror the
        /drain-progress endpoint so the UI uses the same heuristics on
        both surfaces. `by_bucket` is the paged slice ordered as
        stuck_single_policy → stuck_no_policy → migratable, chunk_count
        desc then name asc within category. `total_buckets` is the row
        count BEFORE pagination so the modal can render "showing N of M";
        `next_offset` is non-null when more rows are available.
      properties:
        cluster_id: { type: string }
        current_state:
          type: string
          enum: [live, draining_readonly]
        migratable_chunks: { type: integer, format: int64 }
        stuck_single_policy_chunks: { type: integer, format: int64 }
        stuck_no_policy_chunks: { type: integer, format: int64 }
        total_chunks: { type: integer, format: int64 }
        by_bucket:
          type: array
          items: { $ref: '#/components/schemas/BucketImpactEntry' }
        total_buckets: { type: integer }
        next_offset:
          type: integer
          nullable: true
        last_scan_at:
          type: string
          format: date-time

    BucketReferences:
      type: object
      required: [buckets, total_buckets]
      description: |
        Wire shape returned by GET /clusters/{id}/bucket-references
        (US-006 drain-lifecycle). The page slice is sorted desc by chunk_count
        then asc by name; `total_buckets` is the row count BEFORE pagination
        so the UI can render "showing N of M". `next_offset` is non-null
        when more rows are available.
      properties:
        buckets:
          type: array
          items: { $ref: '#/components/schemas/BucketReferenceEntry' }
        total_buckets: { type: integer }
        next_offset:
          type: integer
          nullable: true

    ClusterRebalanceProgress:
      type: object
      required: [metrics_available, moved_total, refused_total, series]
      description: |
        Per-cluster rebalance counters + 1h / 1m-step sparkline returned by
        GET /clusters/{id}/rebalance-progress (US-005 placement-ui). When
        `metrics_available=false` the totals are zero and `series` is
        empty — the UI chip renders "(metrics unavailable)" instead of
        zeros so the cluster card surface still mounts.
      properties:
        metrics_available: { type: boolean }
        moved_total:
          type: number
          description: |
            sum(strata_rebalance_chunks_moved_total{to="<id>"}) at sample
            time.
        refused_total:
          type: number
          description: |
            sum(strata_rebalance_refused_total{target="<id>"}) at sample
            time.
        series:
          type: array
          description: |
            One-hour rate sparkline at 1m resolution. Each tuple is
            [epoch_ms, rate].
          items:
            type: array
            minItems: 2
            maxItems: 2
            items: { type: number }

    PoolStatus:
      type: object
      required: [name, class, bytes_used, chunk_count, num_replicas, state]
      description: |
        One backing pool / bucket row in DataHealthReport (GET /storage/data).
        `cluster` carries the cluster id the pool/bucket lives on so the UI
        can split rows per cluster (US-001 placement-ui); rendered empty
        ("") for the in-memory backend, which models a single virtual
        cluster.
      properties:
        name: { type: string }
        class:
          type: string
          description: |
            Storage-class label. For backends that map every class to one
            pool/bucket (s3, memory) this is the comma-joined sorted list
            of classes pointing at the row.
        cluster:
          type: string
          description: |
            Cluster id the pool/bucket lives on. Empty for backends that do
            not model multi-cluster topology (memory).
        bytes_used: { type: integer, format: int64 }
        chunk_count:
          type: integer
          format: int64
          description: |
            Count of RADOS chunks (each chunk is up to 4 MiB), NOT the count
            of S3 objects. A 5 MiB S3 object spans two chunks. For S3 object
            count see BucketSummary.object_count.
        num_replicas: { type: integer }
        state: { type: string, description: "Backend-specific liveness label (ok, reachable, error, …)." }

    DataHealthReport:
      type: object
      required: [backend, pools]
      description: |
        Response body of GET /storage/data — one row per backing pool /
        backend-bucket plus cluster-wide warnings that don't fit on a
        per-pool row (RADOS HEALTH_WARN check summaries, S3 reachability
        errors).
      properties:
        backend: { type: string }
        pools:
          type: array
          items: { $ref: '#/components/schemas/PoolStatus' }
        warnings:
          type: array
          items: { type: string }

    BucketPlacement:
      type: object
      required: [placement]
      description: |
        Per-bucket cluster placement policy (US-001 placement-rebalance).
        Maps cluster id → weight; weights are in `[0, 100]` with at least
        one positive entry. A weight of zero excludes the cluster without
        rejecting the policy. Cluster ids must resolve against the live
        `STRATA_RADOS_CLUSTERS` / `STRATA_S3_CLUSTERS` set. Unset (404)
        means "no policy" — chunks route to `$defaultCluster`.
      properties:
        placement:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
            maximum: 100

    UserQuota:
      type: object
      required: [max_buckets, total_max_bytes]
      description: |
        Per-IAM-user quota (US-009). Zero on any field means "unlimited".
        `max_buckets` is enforced at CreateBucket; `total_max_bytes` is enforced
        at PUT-validate by summing live `bucket_stats` across the user's buckets.
      properties:
        max_buckets: { type: integer, format: int32, minimum: 0 }
        total_max_bytes: { type: integer, format: int64, minimum: 0 }

    UsageRow:
      type: object
      required: [day, storage_class, byte_seconds, object_count_avg, object_count_max]
      properties:
        bucket:
          type: string
          description: |
            Source bucket name. Present on the per-user usage feed; omitted on
            the per-bucket feed where the bucket is implicit in the path.
        day: { type: string, format: date, description: "UTC day (YYYY-MM-DD)" }
        storage_class: { type: string }
        byte_seconds: { type: integer, format: int64 }
        object_count_avg: { type: integer, format: int64 }
        object_count_max: { type: integer, format: int64 }

    BucketUsageResponse:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/UsageRow' }

    UserUsageTotals:
      type: object
      required: [byte_seconds, objects]
      properties:
        byte_seconds: { type: integer, format: int64 }
        objects: { type: integer, format: int64 }

    UserUsageResponse:
      type: object
      required: [rows, totals]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/UsageRow' }
        totals: { $ref: '#/components/schemas/UserUsageTotals' }

    LoginRequest:
      type: object
      required: [access_key, secret_key]
      properties:
        access_key: { type: string }
        secret_key: { type: string }

    SessionInfo:
      type: object
      required: [access_key, expires_at]
      properties:
        access_key: { type: string }
        expires_at: { type: integer, format: int64, description: "Unix epoch (seconds) when the session JWT expires" }

    TraceSummary:
      type: object
      required: [trace_id, started_at_ns, duration_ms, status, span_count]
      description: |
        One-row summary of a retained trace. Returned by
        GET /diagnostics/traces so the trace browser can render a list view
        without paging in every span. The full waterfall is fetched via
        GET /diagnostics/trace/{requestID}.
      properties:
        trace_id: { type: string, description: "32-hex OTel trace id" }
        request_id:
          type: string
          description: "X-Request-Id correlation value, if the SDK stamped one on a span"
        root_name: { type: string, description: "Name of the parentless span (typically `<METHOD> <path>`)" }
        started_at_ns: { type: integer, format: int64, description: "min(span.start_ns) — trace start in unix nanoseconds" }
        duration_ms: { type: integer, format: int64, description: "(max(end_ns) - min(start_ns)) / 1e6" }
        status:
          type: string
          enum: [OK, Error, Unset]
          description: "Aggregated trace status — Error if any span errored, otherwise the root span status"
        span_count: { type: integer, description: "Retained span count for the trace" }

    DiagnosticsTracesResponse:
      type: object
      required: [traces, total]
      properties:
        traces:
          type: array
          items: { $ref: '#/components/schemas/TraceSummary' }
        total:
          type: integer
          description: "Total retained traces in the in-process ring buffer (independent of limit/offset)"

  responses:
    Unauthorized:
      description: Authentication missing or invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

security:
  - sigv4: []
  - sessionCookie: []

paths:
  /auth/login:
    post:
      summary: Issue a 24h session cookie from IAM credentials
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login succeeded; session cookie set in Set-Cookie.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: "strata_session=<jwt>; HttpOnly; Secure; SameSite=Strict; Path=/admin; Max-Age=86400"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionInfo' }
        '400':
          description: Invalid JSON body or missing fields.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Invalid access key or secret.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      summary: Clear the session cookie
      operationId: authLogout
      security: []
      responses:
        '200':
          description: Cookie cleared (always returns 200, regardless of prior state).
          headers:
            Set-Cookie:
              schema: { type: string }
              description: "strata_session=; Max-Age=0; Path=/admin"
          content:
            application/json:
              schema:
                type: object
                properties: { ok: { type: boolean } }

  /auth/whoami:
    get:
      summary: Probe current session
      operationId: authWhoami
      responses:
        '200':
          description: Active session info.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionInfo' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cluster/status:
    get:
      summary: Cluster status hero
      operationId: getClusterStatus
      responses:
        '200':
          description: Cluster status payload.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClusterStatus' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cluster/nodes:
    get:
      summary: List cluster nodes (heartbeat table)
      operationId: getClusterNodes
      responses:
        '200':
          description: Nodes list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClusterNodes' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /clusters:
    get:
      summary: List data-backend clusters with drain state (US-006 placement-rebalance)
      operationId: listClusters
      description: |
        Returns every configured data-backend cluster id (union of
        STRATA_RADOS_CLUSTERS / STRATA_S3_CLUSTERS) joined against the
        persisted cluster_state rows. Clusters without a row default to
        state="live".
      responses:
        '200':
          description: Cluster list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClustersList' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /clusters/{id}/drain:
    post:
      summary: Drain a cluster (US-006 placement-rebalance; mode added US-001 drain-transparency)
      operationId: drainCluster
      description: |
        Flips cluster_state to draining_readonly (mode="readonly") or
        evacuating (mode="evacuate"). Body is required — no default
        mode. Legal transitions: live → draining_readonly, live →
        evacuating, draining_readonly → evacuating (upgrade). Any
        other (current_state, mode) pair returns 409 Conflict.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DrainRequest' }
      responses:
        '204':
          description: Drain flipped.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Invalid (state, mode) transition.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvalidTransitionError' }

  /clusters/{id}/undrain:
    post:
      summary: Clear draining state (US-006 placement-rebalance; works from both readonly + evacuating since US-001)
      operationId: undrainCluster
      description: |
        Drops the cluster_state row (absence == live). Works only from
        draining_readonly or evacuating; called against a live cluster
        the endpoint returns 409 Conflict. Moved chunks stay on the
        target cluster — undrain does not reverse a migration in
        flight.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '204':
          description: Undrain flipped.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Cluster is not currently draining.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvalidTransitionError' }

  /clusters/{id}/activate:
    post:
      summary: Promote pending cluster to live with initial weight (US-001 cluster-weights)
      operationId: activateCluster
      description: |
        Flips the cluster_state row from `pending` to `live` with the
        operator-supplied default-routing weight (0..100). Returns 409
        Conflict when state != pending; 400 BadRequest when weight is
        outside [0, 100]. The shared in-process drain/state cache
        invalidates synchronously so the freshly-live cluster picks up
        nil-policy bucket PUTs on the next request.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [weight]
              properties:
                weight:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        '204':
          description: Cluster activated.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Cluster is not in pending state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /clusters/{id}/weight:
    put:
      summary: Adjust default-routing weight on a live cluster (US-001 cluster-weights)
      operationId: updateClusterWeight
      description: |
        Updates the per-cluster default-routing weight while the
        cluster is live. Returns 409 Conflict when state != live; 400
        BadRequest when weight is outside [0, 100]. Cache invalidates
        synchronously so operator drags propagate to routing within
        seconds.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [weight]
              properties:
                weight:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        '204':
          description: Weight updated.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Cluster is not in live state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /clusters/{id}/rebalance-progress:
    get:
      summary: Per-cluster rebalance counters + sparkline (US-005 placement-ui)
      operationId: getClusterRebalanceProgress
      description: |
        Returns the cumulative chunks-moved + chunks-refused counters
        scoped to the destination cluster, plus a 1h / 1m-step
        sparkline of `rate(strata_rebalance_chunks_moved_total{to="<id>"}[5m])`.
        Degrades to `metrics_available=false` with an empty series when
        STRATA_PROMETHEUS_URL is unset or the upstream returns an
        error — the UI chip renders "(metrics unavailable)" so the
        cluster card stays mounted.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Rebalance progress.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClusterRebalanceProgress' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /clusters/{id}/drain-progress:
    get:
      summary: Per-cluster drain-progress snapshot (US-003 drain-lifecycle)
      operationId: getClusterDrainProgress
      description: |
        Returns the in-process draining-progress cache populated by the
        rebalance worker. Always reads from cache — never scans the
        manifest store synchronously per request. When the cluster
        state is not "draining" the numeric fields go null. ETA is
        derived from `rate(strata_rebalance_chunks_moved_total
        {from="<id>"}[5m])`; Prom unavailable or rate=0 surfaces
        eta_seconds=null. `deregister_ready` flips true when
        state="draining" and chunks_on_cluster=0 — the operator's
        signal that the cluster row can be edited out of
        STRATA_RADOS_CLUSTERS / STRATA_S3_CLUSTERS and the gateways
        restarted. Responds 503 ProgressUnavailable when no rebalance
        worker is running on this replica.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Drain progress snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClusterDrainProgress' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: |
            Rebalance worker not running on this replica — the in-process
            progress cache is empty and the endpoint refuses to serve a
            permanently-zero response.

  /clusters/{id}/drain-impact:
    get:
      summary: Pre-evacuate impact preview (US-003 drain-transparency)
      operationId: getClusterDrainImpact
      description: |
        Synchronous scan that walks every bucket and categorizes chunks on
        the target cluster into migratable / stuck_single_policy /
        stuck_no_policy. Backs the BulkPlacementFixDialog (US-005) and
        the redesigned ConfirmDrainModal (US-004) preflight.

        Callable only when state ∈ {live, draining_readonly}. Returns 409
        Conflict for state ∈ {evacuating, removed} — those states must use
        GET /clusters/{id}/drain-progress for live counters.

        Each by_bucket entry carries suggested_policies that the
        BulkPlacementFixDialog renders in a dropdown: one uniform-live
        option (every live cluster at weight 1; draining keys in the
        existing policy forced to 0) and one single-target option per live
        cluster. stuck_no_policy buckets get "Set initial policy" labels;
        every other category gets "Add all live clusters (uniform)" /
        "Replace draining with <id>" labels.

        Results are cached per cluster for 5 minutes so concurrent admin
        viewers and the modal's mode-flip refetch do not stampede the
        store. Sort within by_bucket: stuck_single_policy first, then
        stuck_no_policy, then migratable; within each category descending
        by chunk_count then ascending by name.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - name: limit
          in: query
          schema: { type: integer, default: 100, minimum: 1, maximum: 1000 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Drain impact preview.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClusterDrainImpact' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: |
            Cluster is in state evacuating or removed; the preview endpoint
            refuses to serve and points the operator at /drain-progress.

  /clusters/{id}/bucket-references:
    get:
      summary: Buckets referencing this cluster in their Placement policy (US-006 drain-lifecycle)
      operationId: getClusterBucketReferences
      description: |
        Pre-drain impact preview. Returns every bucket whose Placement policy
        carries a non-zero weight on this cluster id, joined with the
        bucket_stats counter row for chunk_count + bytes_used. Sorted desc
        by chunk_count then asc by name. Pagination via ?limit=N&offset=M;
        `next_offset` is non-null when more rows are available. Default limit
        is 100, max 1000.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - name: limit
          in: query
          schema: { type: integer, default: 100, minimum: 1, maximum: 1000 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Bucket references page.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketReferences' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets:
    get:
      summary: List buckets
      operationId: listBuckets
      description: |
        US-010 Buckets page. `query` is a case-insensitive substring match on
        the bucket name. `sort` defaults to `created`. `order` defaults to
        `asc` for `name`/`owner` and `desc` for `created`/`size`/`object_count`.
        `page` is 1-based and defaults to 1; `page_size` defaults to 50, max 500.
        `total` is the row count BEFORE pagination so the UI can render
        page-count chips.
      parameters:
        - name: query
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, owner, created, size, object_count]
            default: created
        - name: order
          in: query
          schema: { type: string, enum: [asc, desc] }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
      responses:
        '200':
          description: Buckets list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketsList' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/top:
    get:
      summary: Top buckets by size or 24h request count
      operationId: getBucketsTop
      parameters:
        - name: by
          in: query
          schema: { type: string, enum: [size, requests] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
      responses:
        '200':
          description: Top buckets.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketsTop' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}:
    get:
      summary: Bucket detail (US-011)
      operationId: getBucket
      description: |
        Returns bucket metadata + size_bytes + object_count for the bucket
        detail page header. size_bytes/object_count come from a bounded
        ListObjects walk (capped at 50_000 objects). Returns 404
        NoSuchBucket when the bucket is missing.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Bucket details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketDetail' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/distribution:
    get:
      summary: Per-shard byte/object distribution (US-013)
      operationId: getBucketDistribution
      description: |
        Returns one row per shard ID 0..N-1 carrying live (latest
        non-delete-marker) byte and object totals — same data the bucketstats
        sampler emits via `strata_bucket_shard_{bytes,objects}` gauges. The
        Bucket-Shard Distribution tab renders bytes-per-shard +
        objects-per-shard side-by-side BarCharts and surfaces a skew banner
        when `max(shard) / median(shard) > 5`. 404 NoSuchBucket when missing.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Per-shard byte/object distribution.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketDistributionResponse' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/replication-lag:
    get:
      summary: Per-bucket replication queue age time-series (US-014)
      operationId: getBucketReplicationLag
      description: |
        Returns the per-bucket replication queue age (`strata_replication_queue_age_seconds`)
        as a recharts-friendly time-series over the requested range. When the bucket has
        no replication configuration the body is `{empty: true}` and the UI tab hides
        itself. 503 MetricsUnavailable when STRATA_PROMETHEUS_URL is unset.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
        - name: range
          in: query
          schema: { type: string, default: "1h" }
          description: Go duration string (e.g. `15m`, `1h`, `6h`, `24h`); capped at 24h.
      responses:
        '200':
          description: Replication queue age time-series.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketReplicationLagResponse' }
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Prometheus is unavailable (STRATA_PROMETHEUS_URL is empty).
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/objects:
    get:
      summary: List bucket objects (read-only browser)
      operationId: listObjects
      description: |
        Read-only object browser (US-011). `prefix` filters by key prefix
        (folder); `marker` is an exclusive continuation cursor returned by
        the previous page; `delimiter` defaults to `/` so the browser sees
        folders — pass an empty `delimiter=` to get a flat listing.
        `page_size` defaults to 100, max 1000. Returns 404 when the bucket
        is missing.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
        - name: prefix
          in: query
          schema: { type: string }
        - name: marker
          in: query
          schema: { type: string }
        - name: delimiter
          in: query
          schema: { type: string, default: "/" }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        '200':
          description: Objects list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectsList' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/quota:
    get:
      summary: Get bucket quota (US-009)
      operationId: getBucketQuota
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Quota configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketQuota' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Set bucket quota (US-009)
      operationId: putBucketQuota
      description: |
        Replaces the bucket quota configuration. Zero on any field means
        "unlimited". Audit row `admin:PutBucketQuota`.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BucketQuota' }
      responses:
        '204':
          description: Quota saved.
        '400':
          description: Invalid body (negative field, malformed JSON).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete bucket quota (US-009)
      operationId: deleteBucketQuota
      description: |
        Idempotent — returns 204 even when no quota was configured. Audit row
        `admin:DeleteBucketQuota`.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Quota removed.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/placement:
    get:
      summary: Get bucket placement policy (US-001 placement-rebalance)
      operationId: getBucketPlacement
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Placement policy configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketPlacement' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Set bucket placement policy (US-001 placement-rebalance)
      operationId: putBucketPlacement
      description: |
        Replaces the per-bucket cluster placement policy. Weights are
        bounded `[0, 100]`; sum must be > 0. Cluster ids must resolve
        against `STRATA_RADOS_CLUSTERS` / `STRATA_S3_CLUSTERS`. Audit row
        `admin:PutBucketPlacement`.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BucketPlacement' }
      responses:
        '204':
          description: Placement saved.
        '400':
          description: |
            Invalid body — `InvalidPlacement` (weight out of range, sum=0,
            empty cluster id) or `UnknownCluster` (cluster id not in the
            configured set).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete bucket placement policy (US-001 placement-rebalance)
      operationId: deleteBucketPlacement
      description: |
        Idempotent — returns 204 even when no policy was configured. Audit
        row `admin:DeleteBucketPlacement`.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Placement removed.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/usage:
    get:
      summary: Per-bucket daily usage history (US-009)
      operationId: getBucketUsage
      description: |
        Returns one row per (day, storage_class) from `usage_aggregates`.
        Day range is `[start, end]` inclusive (UTC); both default to a 30-day
        window ending today.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
        - name: start
          in: query
          schema: { type: string, format: date }
        - name: end
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Usage rows.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketUsageResponse' }
        '400':
          description: Invalid start / end query parameter.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /iam/users/{userName}/quota:
    get:
      summary: Get user quota (US-009)
      operationId: getUserQuota
      parameters:
        - name: userName
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Quota configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserQuota' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Set user quota (US-009)
      operationId: putUserQuota
      parameters:
        - name: userName
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserQuota' }
      responses:
        '204':
          description: Quota saved.
        '400':
          description: Invalid body (negative field, malformed JSON).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete user quota (US-009)
      operationId: deleteUserQuota
      parameters:
        - name: userName
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Quota removed.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /iam/users/{userName}/usage:
    get:
      summary: Per-user daily usage history (US-009)
      operationId: getUserUsage
      description: |
        Sums usage rows across every bucket the user owns and returns
        per-(bucket, day, storage_class) rows alongside cross-row totals so
        the billing summary can render without re-summing client-side.
      parameters:
        - name: userName
          in: path
          required: true
          schema: { type: string }
        - name: start
          in: query
          schema: { type: string, format: date }
        - name: end
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Usage rows + totals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserUsageResponse' }
        '400':
          description: Invalid start / end query parameter.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /consumers/top:
    get:
      summary: Top consumers by 24h requests or bytes
      operationId: getConsumersTop
      parameters:
        - name: by
          in: query
          schema: { type: string, enum: [requests, bytes] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
      responses:
        '200':
          description: Top consumers.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConsumersTop' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /metrics/timeseries:
    get:
      summary: Cluster metrics timeseries (Prometheus-backed)
      operationId: getMetricsTimeseries
      parameters:
        - name: metric
          in: query
          required: true
          schema:
            type: string
            enum: [request_rate, latency_p50, latency_p95, latency_p99, error_rate, bytes_in, bytes_out]
        - name: range
          in: query
          required: true
          schema: { type: string, description: "Duration string e.g. 15m, 1h, 6h, 24h, 7d" }
        - name: step
          in: query
          schema: { type: string, description: "Resolution step e.g. 15s, 1m, 5m" }
      responses:
        '200':
          description: Timeseries.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetricsTimeseries' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /diagnostics/traces:
    get:
      summary: List recently captured traces (in-process OTel ring buffer)
      operationId: getDiagnosticsTraces
      description: |
        Returns the most-recent N retained trace summaries in LRU order
        (newest first) so the trace browser UI can render a list view
        without forcing the operator to know a request_id upfront. The
        ring buffer retains roughly the last 10 minutes of traffic
        (bytes-budgeted, default 4 MiB). Operators click a row to fetch
        the full waterfall via /diagnostics/trace/{requestID}.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
          description: "Page size; capped at 200 to bound response cost"
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
          description: "Skip the first N entries from the LRU front"
      responses:
        '200':
          description: Recent trace summaries.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiagnosticsTracesResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Ring buffer disabled (`STRATA_OTEL_RINGBUF=off`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
