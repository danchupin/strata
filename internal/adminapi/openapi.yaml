openapi: 3.1.0
info:
  title: Strata Admin API
  version: "1.0.0"
  description: |
    JSON HTTP contract between the embedded Strata operator console and the
    gateway. Phase 1 (US-003 .. US-012) defines the read-only surface; Phase 2
    introduces write actions under a separate /admin/v1/* extension. Versioned
    via the path prefix — breaking changes ship under /admin/v2/*.
  contact:
    name: Strata
servers:
  - url: /admin/v1
    description: Versioned admin namespace on the gateway port

components:
  securitySchemes:
    sigv4:
      type: apiKey
      in: header
      name: Authorization
      description: AWS SigV4 (`AWS4-HMAC-SHA256 Credential=...`).
    sessionCookie:
      type: apiKey
      in: cookie
      name: strata_session
      description: |
        24h JWT issued by `POST /admin/v1/auth/login` (US-004). HS256 signed
        with the per-deployment `STRATA_CONSOLE_JWT_SECRET`.
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    ClusterStatus:
      type: object
      required: [status, version, started_at, uptime_sec, cluster_name, node_count, node_count_healthy, meta_backend, data_backend]
      properties:
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        version: { type: string, description: "Git SHA + tag of the running build" }
        started_at: { type: integer, format: int64, description: "Unix epoch (seconds)" }
        uptime_sec: { type: integer, format: int64 }
        cluster_name: { type: string }
        node_count: { type: integer }
        node_count_healthy: { type: integer }
        meta_backend: { type: string, enum: [cassandra, memory] }
        data_backend: { type: string, enum: [rados, memory] }

    ClusterNode:
      type: object
      required: [id, address, version, started_at, uptime_sec, status, workers, leader_for, last_heartbeat]
      properties:
        id: { type: string }
        address: { type: string }
        version: { type: string }
        started_at: { type: integer, format: int64 }
        uptime_sec: { type: integer, format: int64 }
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        workers: { type: array, items: { type: string } }
        leader_for: { type: array, items: { type: string } }
        last_heartbeat: { type: integer, format: int64 }

    ClusterNodes:
      type: object
      required: [nodes]
      properties:
        nodes:
          type: array
          items: { $ref: '#/components/schemas/ClusterNode' }

    BucketSummary:
      type: object
      required: [name, owner]
      properties:
        name: { type: string }
        owner: { type: string }
        region: { type: string }
        created_at: { type: integer, format: int64 }
        size_bytes: { type: integer, format: int64 }
        object_count: { type: integer, format: int64 }

    BucketsList:
      type: object
      required: [buckets, total]
      properties:
        buckets:
          type: array
          items: { $ref: '#/components/schemas/BucketSummary' }
        total: { type: integer }

    BucketDetail:
      type: object
      required: [name, owner, region, created_at, versioning, object_lock, size_bytes, object_count]
      properties:
        name: { type: string }
        owner: { type: string }
        region: { type: string }
        created_at: { type: integer, format: int64 }
        versioning:
          type: string
          enum: [Enabled, Suspended, Off]
          description: |
            Operator-facing label. Maps the meta-store enum
            (Disabled|Enabled|Suspended) to (Off|Enabled|Suspended).
        object_lock:
          type: boolean
          description: |
            True when bucket-level object lock is on. Phase 1 always
            reports false — bucket object-lock state is not persisted on
            meta.Bucket today; Phase 2 lifts this.
        size_bytes: { type: integer, format: int64 }
        object_count: { type: integer, format: int64 }
        backend_presign: { type: boolean }
        shard_count:
          type: integer
          description: |
            Active sharding factor for the bucket's `objects` table partition
            (hash(key)%N). Surfaced for the Hot Shards drill panel which
            reconstructs shard from key client-side via FNV-1a.
        replication_configured:
          type: boolean
          description: |
            True when the bucket has a non-empty replication configuration.
            The UI uses this flag to gate the per-bucket Replication tab
            (US-014); only buckets with a configuration get the tab.

    BucketShardStat:
      type: object
      required: [shard, bytes, objects]
      properties:
        shard: { type: integer, description: "Shard ID (0..N-1)." }
        bytes: { type: integer, format: int64 }
        objects: { type: integer, format: int64 }

    BucketDistributionResponse:
      type: object
      required: [shards]
      properties:
        shards:
          type: array
          items: { $ref: '#/components/schemas/BucketShardStat' }
          description: |
            One row per shard ID 0..N-1, contiguous and zero-filled when a
            shard has no live objects. Same data the bucketstats sampler
            emits via `strata_bucket_shard_{bytes,objects}` gauges.

    BucketReplicationLagPoint:
      type: object
      required: [ts, value]
      properties:
        ts: { type: string, format: date-time }
        value: { type: number, format: float }

    BucketReplicationLagResponse:
      type: object
      properties:
        empty:
          type: boolean
          description: True when the bucket has no replication configuration.
        reason:
          type: string
          description: Human-readable explanation when `empty=true`.
        values:
          type: array
          items: { $ref: '#/components/schemas/BucketReplicationLagPoint' }

    BucketTop:
      type: object
      required: [name]
      properties:
        name: { type: string }
        size_bytes: { type: integer, format: int64 }
        object_count: { type: integer, format: int64 }
        request_count_24h: { type: integer, format: int64 }

    BucketsTop:
      type: object
      required: [buckets, metrics_available]
      properties:
        buckets:
          type: array
          items: { $ref: '#/components/schemas/BucketTop' }
        metrics_available:
          type: boolean
          description: |
            False when STRATA_PROMETHEUS_URL is unset or the upstream PromQL
            query failed. The UI then renders '—' in the request column and
            a "Metrics unavailable" warning under the card title.

    ObjectSummary:
      type: object
      required: [key]
      properties:
        key: { type: string }
        size: { type: integer, format: int64 }
        last_modified: { type: integer, format: int64 }
        etag: { type: string }
        storage_class: { type: string }

    ObjectsList:
      type: object
      required: [objects, common_prefixes, is_truncated]
      properties:
        objects:
          type: array
          items: { $ref: '#/components/schemas/ObjectSummary' }
        common_prefixes:
          type: array
          items: { type: string }
        next_marker: { type: string }
        is_truncated: { type: boolean }

    ConsumerTop:
      type: object
      required: [access_key]
      properties:
        access_key: { type: string }
        user: { type: string }
        request_count_24h: { type: integer, format: int64 }
        bytes_24h: { type: integer, format: int64 }

    ConsumersTop:
      type: object
      required: [consumers, metrics_available]
      properties:
        consumers:
          type: array
          items: { $ref: '#/components/schemas/ConsumerTop' }
        metrics_available:
          type: boolean
          description: |
            False when STRATA_PROMETHEUS_URL is unset or the upstream PromQL
            query failed. The UI then renders the "Metrics unavailable"
            warning instead of empty rows.

    MetricPoint:
      type: array
      minItems: 2
      maxItems: 2
      items: { type: number }
      description: "[epoch_ms, value]"

    MetricSeries:
      type: object
      required: [name, points]
      properties:
        name: { type: string }
        points:
          type: array
          items: { $ref: '#/components/schemas/MetricPoint' }

    MetricsTimeseries:
      type: object
      required: [series, metrics_available]
      properties:
        series:
          type: array
          items: { $ref: '#/components/schemas/MetricSeries' }
        metrics_available:
          type: boolean
          description: |
            False when STRATA_PROMETHEUS_URL is unset or the upstream PromQL
            query failed. The UI then renders a "Metrics unavailable —
            set STRATA_PROMETHEUS_URL" inline message instead of empty
            charts.

    BucketQuota:
      type: object
      required: [max_bytes, max_objects, max_bytes_per_object]
      description: |
        Per-bucket quota (US-009). Zero on any field means "unlimited" — matches
        the AWS / RGW semantics of an unset field. Enforced at PUT-validate time
        (US-006); a violation returns HTTP 403 with S3 code `QuotaExceeded`.
      properties:
        max_bytes: { type: integer, format: int64, minimum: 0 }
        max_objects: { type: integer, format: int64, minimum: 0 }
        max_bytes_per_object: { type: integer, format: int64, minimum: 0 }

    BucketPlacement:
      type: object
      required: [placement]
      description: |
        Per-bucket cluster placement policy (US-001 placement-rebalance).
        Maps cluster id → weight; weights are in `[0, 100]` with at least
        one positive entry. A weight of zero excludes the cluster without
        rejecting the policy. Cluster ids must resolve against the live
        `STRATA_RADOS_CLUSTERS` / `STRATA_S3_CLUSTERS` set. Unset (404)
        means "no policy" — chunks route to `$defaultCluster`.
      properties:
        placement:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
            maximum: 100

    UserQuota:
      type: object
      required: [max_buckets, total_max_bytes]
      description: |
        Per-IAM-user quota (US-009). Zero on any field means "unlimited".
        `max_buckets` is enforced at CreateBucket; `total_max_bytes` is enforced
        at PUT-validate by summing live `bucket_stats` across the user's buckets.
      properties:
        max_buckets: { type: integer, format: int32, minimum: 0 }
        total_max_bytes: { type: integer, format: int64, minimum: 0 }

    UsageRow:
      type: object
      required: [day, storage_class, byte_seconds, object_count_avg, object_count_max]
      properties:
        bucket:
          type: string
          description: |
            Source bucket name. Present on the per-user usage feed; omitted on
            the per-bucket feed where the bucket is implicit in the path.
        day: { type: string, format: date, description: "UTC day (YYYY-MM-DD)" }
        storage_class: { type: string }
        byte_seconds: { type: integer, format: int64 }
        object_count_avg: { type: integer, format: int64 }
        object_count_max: { type: integer, format: int64 }

    BucketUsageResponse:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/UsageRow' }

    UserUsageTotals:
      type: object
      required: [byte_seconds, objects]
      properties:
        byte_seconds: { type: integer, format: int64 }
        objects: { type: integer, format: int64 }

    UserUsageResponse:
      type: object
      required: [rows, totals]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/UsageRow' }
        totals: { $ref: '#/components/schemas/UserUsageTotals' }

    LoginRequest:
      type: object
      required: [access_key, secret_key]
      properties:
        access_key: { type: string }
        secret_key: { type: string }

    SessionInfo:
      type: object
      required: [access_key, expires_at]
      properties:
        access_key: { type: string }
        expires_at: { type: integer, format: int64, description: "Unix epoch (seconds) when the session JWT expires" }

  responses:
    Unauthorized:
      description: Authentication missing or invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

security:
  - sigv4: []
  - sessionCookie: []

paths:
  /auth/login:
    post:
      summary: Issue a 24h session cookie from IAM credentials
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login succeeded; session cookie set in Set-Cookie.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: "strata_session=<jwt>; HttpOnly; Secure; SameSite=Strict; Path=/admin; Max-Age=86400"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionInfo' }
        '400':
          description: Invalid JSON body or missing fields.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Invalid access key or secret.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      summary: Clear the session cookie
      operationId: authLogout
      security: []
      responses:
        '200':
          description: Cookie cleared (always returns 200, regardless of prior state).
          headers:
            Set-Cookie:
              schema: { type: string }
              description: "strata_session=; Max-Age=0; Path=/admin"
          content:
            application/json:
              schema:
                type: object
                properties: { ok: { type: boolean } }

  /auth/whoami:
    get:
      summary: Probe current session
      operationId: authWhoami
      responses:
        '200':
          description: Active session info.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionInfo' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cluster/status:
    get:
      summary: Cluster status hero
      operationId: getClusterStatus
      responses:
        '200':
          description: Cluster status payload.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClusterStatus' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cluster/nodes:
    get:
      summary: List cluster nodes (heartbeat table)
      operationId: getClusterNodes
      responses:
        '200':
          description: Nodes list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClusterNodes' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets:
    get:
      summary: List buckets
      operationId: listBuckets
      description: |
        US-010 Buckets page. `query` is a case-insensitive substring match on
        the bucket name. `sort` defaults to `created`. `order` defaults to
        `asc` for `name`/`owner` and `desc` for `created`/`size`/`object_count`.
        `page` is 1-based and defaults to 1; `page_size` defaults to 50, max 500.
        `total` is the row count BEFORE pagination so the UI can render
        page-count chips.
      parameters:
        - name: query
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, owner, created, size, object_count]
            default: created
        - name: order
          in: query
          schema: { type: string, enum: [asc, desc] }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
      responses:
        '200':
          description: Buckets list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketsList' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/top:
    get:
      summary: Top buckets by size or 24h request count
      operationId: getBucketsTop
      parameters:
        - name: by
          in: query
          schema: { type: string, enum: [size, requests] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
      responses:
        '200':
          description: Top buckets.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketsTop' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}:
    get:
      summary: Bucket detail (US-011)
      operationId: getBucket
      description: |
        Returns bucket metadata + size_bytes + object_count for the bucket
        detail page header. size_bytes/object_count come from a bounded
        ListObjects walk (capped at 50_000 objects). Returns 404
        NoSuchBucket when the bucket is missing.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Bucket details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketDetail' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/distribution:
    get:
      summary: Per-shard byte/object distribution (US-013)
      operationId: getBucketDistribution
      description: |
        Returns one row per shard ID 0..N-1 carrying live (latest
        non-delete-marker) byte and object totals — same data the bucketstats
        sampler emits via `strata_bucket_shard_{bytes,objects}` gauges. The
        Bucket-Shard Distribution tab renders bytes-per-shard +
        objects-per-shard side-by-side BarCharts and surfaces a skew banner
        when `max(shard) / median(shard) > 5`. 404 NoSuchBucket when missing.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Per-shard byte/object distribution.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketDistributionResponse' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/replication-lag:
    get:
      summary: Per-bucket replication queue age time-series (US-014)
      operationId: getBucketReplicationLag
      description: |
        Returns the per-bucket replication queue age (`strata_replication_queue_age_seconds`)
        as a recharts-friendly time-series over the requested range. When the bucket has
        no replication configuration the body is `{empty: true}` and the UI tab hides
        itself. 503 MetricsUnavailable when STRATA_PROMETHEUS_URL is unset.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
        - name: range
          in: query
          schema: { type: string, default: "1h" }
          description: Go duration string (e.g. `15m`, `1h`, `6h`, `24h`); capped at 24h.
      responses:
        '200':
          description: Replication queue age time-series.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketReplicationLagResponse' }
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Prometheus is unavailable (STRATA_PROMETHEUS_URL is empty).
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/objects:
    get:
      summary: List bucket objects (read-only browser)
      operationId: listObjects
      description: |
        Read-only object browser (US-011). `prefix` filters by key prefix
        (folder); `marker` is an exclusive continuation cursor returned by
        the previous page; `delimiter` defaults to `/` so the browser sees
        folders — pass an empty `delimiter=` to get a flat listing.
        `page_size` defaults to 100, max 1000. Returns 404 when the bucket
        is missing.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
        - name: prefix
          in: query
          schema: { type: string }
        - name: marker
          in: query
          schema: { type: string }
        - name: delimiter
          in: query
          schema: { type: string, default: "/" }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        '200':
          description: Objects list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectsList' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/quota:
    get:
      summary: Get bucket quota (US-009)
      operationId: getBucketQuota
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Quota configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketQuota' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Set bucket quota (US-009)
      operationId: putBucketQuota
      description: |
        Replaces the bucket quota configuration. Zero on any field means
        "unlimited". Audit row `admin:PutBucketQuota`.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BucketQuota' }
      responses:
        '204':
          description: Quota saved.
        '400':
          description: Invalid body (negative field, malformed JSON).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete bucket quota (US-009)
      operationId: deleteBucketQuota
      description: |
        Idempotent — returns 204 even when no quota was configured. Audit row
        `admin:DeleteBucketQuota`.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Quota removed.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/placement:
    get:
      summary: Get bucket placement policy (US-001 placement-rebalance)
      operationId: getBucketPlacement
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Placement policy configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketPlacement' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Set bucket placement policy (US-001 placement-rebalance)
      operationId: putBucketPlacement
      description: |
        Replaces the per-bucket cluster placement policy. Weights are
        bounded `[0, 100]`; sum must be > 0. Cluster ids must resolve
        against `STRATA_RADOS_CLUSTERS` / `STRATA_S3_CLUSTERS`. Audit row
        `admin:PutBucketPlacement`.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BucketPlacement' }
      responses:
        '204':
          description: Placement saved.
        '400':
          description: |
            Invalid body — `InvalidPlacement` (weight out of range, sum=0,
            empty cluster id) or `UnknownCluster` (cluster id not in the
            configured set).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete bucket placement policy (US-001 placement-rebalance)
      operationId: deleteBucketPlacement
      description: |
        Idempotent — returns 204 even when no policy was configured. Audit
        row `admin:DeleteBucketPlacement`.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Placement removed.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /buckets/{bucket}/usage:
    get:
      summary: Per-bucket daily usage history (US-009)
      operationId: getBucketUsage
      description: |
        Returns one row per (day, storage_class) from `usage_aggregates`.
        Day range is `[start, end]` inclusive (UTC); both default to a 30-day
        window ending today.
      parameters:
        - name: bucket
          in: path
          required: true
          schema: { type: string }
        - name: start
          in: query
          schema: { type: string, format: date }
        - name: end
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Usage rows.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BucketUsageResponse' }
        '400':
          description: Invalid start / end query parameter.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /iam/users/{userName}/quota:
    get:
      summary: Get user quota (US-009)
      operationId: getUserQuota
      parameters:
        - name: userName
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Quota configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserQuota' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Set user quota (US-009)
      operationId: putUserQuota
      parameters:
        - name: userName
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserQuota' }
      responses:
        '204':
          description: Quota saved.
        '400':
          description: Invalid body (negative field, malformed JSON).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete user quota (US-009)
      operationId: deleteUserQuota
      parameters:
        - name: userName
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Quota removed.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /iam/users/{userName}/usage:
    get:
      summary: Per-user daily usage history (US-009)
      operationId: getUserUsage
      description: |
        Sums usage rows across every bucket the user owns and returns
        per-(bucket, day, storage_class) rows alongside cross-row totals so
        the billing summary can render without re-summing client-side.
      parameters:
        - name: userName
          in: path
          required: true
          schema: { type: string }
        - name: start
          in: query
          schema: { type: string, format: date }
        - name: end
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Usage rows + totals.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserUsageResponse' }
        '400':
          description: Invalid start / end query parameter.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /consumers/top:
    get:
      summary: Top consumers by 24h requests or bytes
      operationId: getConsumersTop
      parameters:
        - name: by
          in: query
          schema: { type: string, enum: [requests, bytes] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
      responses:
        '200':
          description: Top consumers.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConsumersTop' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /metrics/timeseries:
    get:
      summary: Cluster metrics timeseries (Prometheus-backed)
      operationId: getMetricsTimeseries
      parameters:
        - name: metric
          in: query
          required: true
          schema:
            type: string
            enum: [request_rate, latency_p50, latency_p95, latency_p99, error_rate, bytes_in, bytes_out]
        - name: range
          in: query
          required: true
          schema: { type: string, description: "Duration string e.g. 15m, 1h, 6h, 24h, 7d" }
        - name: step
          in: query
          schema: { type: string, description: "Resolution step e.g. 15s, 1m, 5m" }
      responses:
        '200':
          description: Timeseries.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetricsTimeseries' }
        '401':
          $ref: '#/components/responses/Unauthorized'
