syntax = "proto3";

package strata.data.v1;

option go_package = "github.com/danchupin/strata/internal/data/manifestpb;manifestpb";

// Manifest mirrors data.Manifest (internal/data/manifest.go). New fields must
// keep wire compatibility — append-only field numbers, no renumbering.
message Manifest {
  string class = 1;
  int64 size = 2;
  int64 chunk_size = 3;
  string etag = 4;
  repeated ChunkRef chunks = 5;
  // part_chunks records the number of chunks contributed by each part of a
  // multipart upload, in part order.
  repeated int64 part_chunks = 6;
  // part_checksums is the per-part stored checksum map (algo -> value), one
  // entry per part in PartNumber order.
  repeated PartChecksum part_checksums = 7;
}

message ChunkRef {
  string cluster = 1;
  string pool = 2;
  string namespace = 3;
  string oid = 4;
  int64 size = 5;
}

message PartChecksum {
  map<string, string> values = 1;
}
