syntax = "proto3";

package strata.data.v1;

option go_package = "github.com/danchupin/strata/internal/data/manifestpb;manifestpb";

// Manifest mirrors data.Manifest (internal/data/manifest.go). New fields must
// keep wire compatibility — append-only field numbers, no renumbering.
//
// Field-number ledger:
//   1..5   Class / Size / ChunkSize / ETag / Chunks
//   6      PartChunkCounts (US-049 multipart SSE; pre-US-001 label
//          part_chunks; wire format unchanged)
//   7      PartChecksums (US-049 multipart SSE)
//   8      BackendRef (US-008 S3-over-S3 data backend)
//   12     SSEInfo (US-013 SSE mode wire record)
//   13     PartChunks (US-001 per-part byte ranges)
message Manifest {
  string class = 1;
  int64 size = 2;
  int64 chunk_size = 3;
  string etag = 4;
  repeated ChunkRef chunks = 5;
  repeated int64 part_chunk_counts = 6;
  repeated PartChecksum part_checksums = 7;
  BackendRef backend_ref = 8;
  SSEInfo sse = 12;
  repeated PartRange part_chunks = 13;

  reserved 9 to 11;
}

message PartRange {
  int32 part_number = 1;
  int64 offset = 2;
  int64 size = 3;
  string etag = 4;
  string checksum_value = 5;
  string checksum_algorithm = 6;
}

message ChunkRef {
  string cluster = 1;
  string pool = 2;
  string namespace = 3;
  string oid = 4;
  int64 size = 5;
}

message PartChecksum {
  map<string, string> values = 1;
}

message BackendRef {
  string backend = 1;
  string key = 2;
  string etag = 3;
  int64 size = 4;
  string version_id = 5;
  // cluster is the operator-labelled S3 cluster id that hosts this
  // backend object. Populated by s3.Backend.PutChunks (US-005 placement-
  // rebalance) so the rebalance worker can scan BackendRef-shape
  // manifests and decide whether a move is needed. Pre-US-005 rows have
  // an empty value; the worker skips them (rewriter cycle can backfill).
  string cluster = 6;
}

message SSEInfo {
  string mode = 1;
  string algorithm = 2;
  string kms_key_id = 3;
}
