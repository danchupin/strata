// US-008 / US-013 / US-s3-tests-90 field-number assignment
//
// At US-008 story-start, the highest field number in this manifest schema
// is N=5 (Manifest.Chunks). Reservations carved out by US-008/US-013:
//
//   N+1 = 6   Manifest.backend_ref           (BackendRef message ref) — US-008
//   N+2 = 7   reserved (Manifest.backend)    sub-field of BackendRef if ever flattened — US-008
//   N+3 = 8   reserved (Manifest.key)        sub-field of BackendRef if ever flattened — US-008
//   N+4 = 9   reserved (Manifest.etag)       sub-field of BackendRef if ever flattened — US-008
//   N+5 = 10  reserved (Manifest.size_bytes) sub-field of BackendRef if ever flattened — US-008
//   N+6 = 11  reserved (Manifest.version_id) sub-field of BackendRef if ever flattened — US-008
//   N+7 = 12  Manifest.sse                   (SSEInfo message ref) — US-013 (now allocated)
//   N+8 = 13  Manifest.part_chunks           (repeated PartRange) — US-s3-tests-90 US-001
//   N+9..N+13 = 14..18  reserved             sub-fields of PartRange if ever flattened — US-s3-tests-90 US-001
//   N+14 = 19 Manifest.multipart_checksum_algorithm (string)        — US-s3-tests-90 US-003
//   N+15 = 20 Manifest.multipart_checksum_type      (string)        — US-s3-tests-90 US-003
//   N+16 = 21 Manifest.multipart_checksum           (string)        — US-s3-tests-90 US-003
//
// SSEInfo sub-fields live in their own field-number space inside the SSE
// message. PartRange sub-fields likewise live in their own field-number
// space inside the PartRange message. Numbers 7..11 stay reserved against
// accidental flatten of BackendRef sub-fields, and 14..18 stay reserved
// against accidental flatten of PartRange sub-fields. New unrelated
// additive fields MUST start at 22 or above; renumbering is forbidden —
// the schema is wire-compatible across RADOS-mode and S3-mode manifests
// both directions.

syntax = "proto3";

package strata.data.v1;

option go_package = "github.com/danchupin/strata/internal/data";

message Manifest {
  string class = 1;
  int64 size = 2;
  int64 chunk_size = 3;
  string etag = 4;
  repeated ChunkRef chunks = 5;
  BackendRef backend_ref = 6;
  SSEInfo sse = 12;
  repeated PartRange part_chunks = 13;
  string multipart_checksum_algorithm = 19;
  string multipart_checksum_type = 20;
  string multipart_checksum = 21;

  reserved 7 to 11;
  reserved 14 to 18;
  reserved "backend", "key", "size_bytes", "version_id";
}

message ChunkRef {
  string cluster = 1;
  string pool = 2;
  string namespace = 3;
  string oid = 4;
  int64 size = 5;
}

// BackendRef — see internal/data/manifest.go BackendRef doc-comment for the
// canonical VersionID three-shape semantics ('' / 'null' / <uuid>).
message BackendRef {
  string backend = 1;
  string key = 2;
  string etag = 3;
  int64 size = 4;
  string version_id = 5;
}

// SSEInfo — see internal/data/manifest.go SSEInfo doc-comment for the
// canonical mode / algorithm semantics. Mode value vocabulary
// {"passthrough", "strata", "both"}; Algorithm vocabulary
// {"AES256", "aws:kms"} or empty (for SSEModeStrata).
message SSEInfo {
  string mode = 1;
  string algorithm = 2;
  string kms_key_id = 3;
}

// PartRange — see internal/data/manifest.go PartRange doc-comment for the
// canonical multipart per-part offset semantics. Populated by
// CompleteMultipartUpload at LWT-success time so the ?partNumber=N GET
// path can serve part N without scanning the whole object.
message PartRange {
  int32 part_number = 1;
  int64 offset = 2;
  int64 size = 3;
  string etag = 4;
  string checksum_value = 5;
  string checksum_algorithm = 6;
}
